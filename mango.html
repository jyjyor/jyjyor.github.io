<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mango — Jiayi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#1a1c2a; cursor:none; }
canvas { display:block; width:100vw; height:100vh; }
#cursor { position:fixed; width:7px; height:7px; background:rgba(220,165,55,0.7); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
#back { position:fixed; top:1.8rem; left:2.2rem; z-index:100; font-family:'Cormorant Garamond',serif; font-size:1.55rem; font-weight:300; font-style:italic; letter-spacing:0.18em; color:rgba(136,184,168,0.72); text-decoration:none; cursor:none; transition:color 0.5s; }
#back:hover { color:rgba(136,184,168,1.0); }
#timeLabel { position:fixed; top:1.8rem; right:2.2rem; z-index:100; font-family:'Cormorant Garamond',serif; font-size:1.55rem; font-style:italic; letter-spacing:0.22em; color:rgba(136,184,168,0.72); pointer-events:none; }
#caption { position:fixed; bottom:3rem; right:2.5rem; z-index:100; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.18rem; font-weight:300; letter-spacing:0.06em; line-height:2.2; color:rgba(235,222,185,0.44); text-align:right; max-width:340px; pointer-events:none; }
#snd { position:fixed; bottom:3rem; left:2.5rem; z-index:100; font-family:'Raleway',sans-serif; font-size:0.72rem; font-weight:300; letter-spacing:0.28em; text-transform:uppercase; color:rgba(235,222,185,0.32); cursor:none; user-select:none; transition:color 0.4s; }
#snd:hover { color:rgba(235,222,185,0.68); }
</style>
</head>
<body>
<div id="cursor"></div>
<a id="back" href="index.html">← Jiayi</a>
<span id="timeLabel">day</span>
<p id="caption">By day, it drifts like<br>a dried mango slice.</p>
<p id="snd">○ sound</p>
<canvas id="c"></canvas>

<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
let W, H, DPR = 1, tick = 0;
let audioCtx, gainNode, soundOn = false;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = C.width  = innerWidth  * DPR;
  H = C.height = innerHeight * DPR;
}
window.addEventListener('resize', resize); resize();

document.addEventListener('mousemove', e => {
  const c = document.getElementById('cursor');
  c.style.left = e.clientX + 'px'; c.style.top = e.clientY + 'px';
});

// ─── CYCLE: 30 seconds ───────────────────────────────────────
const CYCLE = 30 * 60;
const PH = { day:0.35, sunset:0.50, dusk:0.60, night:0.85 };

function pct() { return (tick % CYCLE) / CYCLE; }
function ss(a,b,x){ const t=Math.max(0,Math.min(1,(x-a)/(b-a))); return t*t*(3-2*t); }
function lerp(a,b,t){ return a+(b-a)*t; }
function lc(a,b,t){ return a.map((v,i)=>v+(b[i]-v)*t); }
function rgb(c){ return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`; }
function rgba(c,a){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

// ─── PALETTES (soft, muted) ───────────────────────────────────
const P = {
  day:    { sT:[196,203,190], sB:[226,216,188], wT:[136,184,168], wB:[88,142,124],  lC:[255,238,165], lA:0.14 },
  sunset: { sT:[208,155,112], sB:[232,198,152], wT:[175,132,100], wB:[140,105,75],  lC:[240,208,152], lA:0.12 },
  dusk:   { sT:[125,112,148], sB:[182,148,128], wT:[100,112,152], wB:[72,85,122],   lC:[212,188,155], lA:0.09 },
  night:  { sT:[14,20,48],    sB:[28,40,72],    wT:[28,48,92],    wB:[18,32,68],    lC:[172,212,255], lA:0.10 },
};
function bP(a,b,t){ return { sT:lc(a.sT,b.sT,t),sB:lc(a.sB,b.sB,t),wT:lc(a.wT,b.wT,t),wB:lc(a.wB,b.wB,t),lC:lc(a.lC,b.lC,t),lA:lerp(a.lA,b.lA,t) }; }
function pal(){ const c=pct(); if(c<PH.day)return P.day; if(c<PH.sunset)return bP(P.day,P.sunset,ss(PH.day,PH.sunset,c)); if(c<PH.dusk)return bP(P.sunset,P.dusk,ss(PH.sunset,PH.dusk,c)); if(c<PH.night)return bP(P.dusk,P.night,ss(PH.dusk,PH.dusk+0.06,c)); return bP(P.night,P.day,ss(PH.night,1.0,c)); }

function nightAmt(){ const c=pct(); if(c<PH.dusk)return 0; if(c<PH.night)return ss(PH.dusk,PH.dusk+0.06,c); return 1-ss(PH.night,1.0,c); }
function aliveAmt(){ const c=pct(); const s=PH.dusk+0.03,pk=PH.dusk+0.14,e=PH.night-0.02,f=PH.night+0.04; if(c<s)return 0; if(c<pk)return ss(s,pk,c); if(c<e)return 1; if(c<f)return 1-ss(e,f,c); return 0; }

// ─── STATIC DATA ─────────────────────────────────────────────
const lights = Array.from({length:20},()=>({
  x:Math.random(), y:0.44+Math.random()*0.52,
  w:Math.random()*80+16, h:Math.random()*10+3,
  ang:(Math.random()-.5)*0.5,
  spd:(Math.random()*0.0001+0.00003)*(Math.random()>.5?1:-1),
  ph:Math.random()*Math.PI*2, al:Math.random()*0.16+0.06,
}));

// Visible flowing wave bands — the main water movement
const flowWaves = [
  { yFrac:0.413, amp:5.8, freq:0.0024, spd:0.075, al:0.062, ph:0.0 },
  { yFrac:0.440, amp:4.4, freq:0.0031, spd:0.058, al:0.048, ph:1.6 },
  { yFrac:0.472, amp:3.2, freq:0.0039, spd:0.044, al:0.036, ph:3.0 },
  { yFrac:0.510, amp:2.4, freq:0.0047, spd:0.034, al:0.026, ph:0.9 },
  { yFrac:0.555, amp:1.7, freq:0.0055, spd:0.026, al:0.018, ph:2.3 },
  { yFrac:0.608, amp:1.2, freq:0.0062, spd:0.020, al:0.013, ph:1.1 },
];

// Fine surface texture (deeper water only)
const rips = Array.from({length:10},(_,i)=>({
  yf:0.62+(i/10)*0.36, amp:0.7+i*0.15,
  freq:0.0040+i*0.0006, spd:0.028+i*0.007, al:0.013+i*0.001,
}));

const stars = Array.from({length:65},()=>({
  x:Math.random(), y:Math.random()*0.37,
  r:Math.random()*1.5+0.4, ph:Math.random()*Math.PI*2, tw:Math.random()*0.02+0.009,
}));

const floaters = Array.from({length:4},(_,i)=>({
  xStart: 0.1 + i*0.22 + Math.random()*0.1,
  yFrac:  0.435 + Math.random()*0.06,
  scale:  0.22 + Math.random()*0.2,
  spd:    0.000055 + Math.random()*0.000035,
  bob:    Math.random()*Math.PI*2,
  ang:    (Math.random()-0.5)*0.35,
  alpha:  0.55 + Math.random()*0.25,
}));

// Creek current streaks — thin drifting horizontal wisps
const creekStreaks = Array.from({length:16},(_,i)=>({
  yFrac: 0.415 + (i/16)*0.57,
  xBase: Math.random(),
  len:   0.07 + Math.random()*0.18,
  spd:   (0.000038 + Math.random()*0.000068) * (Math.random()<0.82 ? 1 : -0.28),
  al:    0.018 + Math.random()*0.026,
  wavY:  (0.0018 + Math.random()*0.0030),
  wavSpd:0.010 + Math.random()*0.016,
  ph:    Math.random()*Math.PI*2,
  thick: 0.45 + Math.random()*0.7,
}));

// Surface shimmers — tiny glints at waterline
const shimmers = Array.from({length:24},()=>({
  x:    Math.random(),
  yFrac:0.410 + Math.random()*0.06,
  spd:  (Math.random()*0.000055+0.000018) * (Math.random()<0.7?1:-1),
  ph:   Math.random()*Math.PI*2,
  tw:   Math.random()*0.038+0.018,
  w:    (9+Math.random()*18)*1,
  h:    (1.4+Math.random()*2.2)*1,
  al:   0.055+Math.random()*0.085,
}));

// ─── MANGO SLICE (base shape) ────────────────────────────────
function drawSlice(cx, cy, w, h, ang, alpha) {
  X.save(); X.globalAlpha = alpha;
  X.save(); X.translate(cx, cy); X.rotate(ang);

  // Animated soft gradient — gentle breathing
  const breathe = Math.sin(tick * 0.028 + ang * 2);
  const gc = (198 + breathe * 24)|0;
  const g = X.createRadialGradient(-w*0.08,-h*0.12,0,0,0,w);
  g.addColorStop(0,  `rgba(255,${gc},35,0.98)`);
  g.addColorStop(0.35,'rgba(255,145,12,0.97)');
  g.addColorStop(0.70,'rgba(225,95,10,0.94)');
  g.addColorStop(1,   'rgba(182,68,8,0.66)');
  X.beginPath(); X.ellipse(0,0,w,h,0,0,Math.PI*2);
  X.fillStyle=g; X.fill();

  // Wrinkle lines
  X.save(); X.strokeStyle='rgba(172,108,20,0.18)'; X.lineWidth=0.7*DPR; X.lineCap='round';
  for(let i=-2;i<=2;i++){
    const lx=i*w*0.2;
    X.beginPath(); X.moveTo(lx,-h*0.62); X.quadraticCurveTo(lx+w*0.05,0,lx-w*0.03,h*0.62); X.stroke();
  }
  X.restore();

  // Soft animated highlight that drifts gently
  const hlx = Math.sin(tick*0.022+ang)*w*0.22, hly = Math.sin(tick*0.018+0.9+ang)*h*0.2;
  const hi=X.createRadialGradient(-w*0.22+hlx,-h*0.26+hly,0,-w*0.04+hlx,-h*0.04+hly,w*0.72);
  hi.addColorStop(0,'rgba(255,250,208,0.27)'); hi.addColorStop(1,'rgba(255,242,188,0)');
  X.fillStyle=hi; X.beginPath(); X.ellipse(0,0,w,h,0,0,Math.PI*2); X.fill();

  X.restore();

  // Water shadow below
  const sh=X.createRadialGradient(cx,cy+h*0.7,0,cx,cy+h*1.1,w*1.3);
  sh.addColorStop(0,'rgba(160,120,25,0.18)'); sh.addColorStop(1,'rgba(160,120,25,0)');
  X.fillStyle=sh; X.beginPath(); X.ellipse(cx,cy+h*0.8,w*1.2,h*0.45,0,0,Math.PI*2); X.fill();

  X.restore();
}

// ─── FLOATING SMALL PIECES ───────────────────────────────────
function drawFloaters() {
  floaters.forEach(f=>{
    const x = ((f.xStart - tick*f.spd) % 1.15) * W;
    if(x < -W*0.12 || x > W*1.12) return;
    const y = f.yFrac*H + Math.sin(tick*0.022+f.bob)*2*DPR;
    const sw = W*0.028*f.scale, sh = H*0.014*f.scale;
    drawSlice(x, y, sw, sh, f.ang, f.alpha);
  });
}

// ─── helpers: draw organic blob outline path ─────────────────
function blobPath(bw, bh, j1, j2) {
  X.moveTo(0, -bh);
  X.bezierCurveTo( bw*0.62+j1,-bh*0.92, bw*1.05+j2,-bh*0.35, bw*1.02, bh*0.15);
  X.bezierCurveTo( bw*0.96, bh*0.70,  bw*0.56, bh*1.02, 0, bh*0.98);
  X.bezierCurveTo(-bw*0.56, bh*1.02, -bw*0.96, bh*0.70,-bw*1.02, bh*0.15);
  X.bezierCurveTo(-bw*1.05+j2,-bh*0.35,-bw*0.62+j1,-bh*0.92, 0, -bh);
}

// ─── MAIN MANGO CREATURE (left): flat slice → sleepy creature ─
function drawMangoCreature(fx, fy, ap, np) {
  const bob  = Math.sin(tick*0.028)*3*DPR;
  const cy   = fy + bob;
  const cx   = fx + Math.sin(tick*0.018)*2.2*DPR;
  const tilt = Math.sin(tick*0.019)*0.03*ap;

  // Size: wide flat slice (day) → compact upright creature (night)
  const R    = H*0.052;
  const sw   = lerp(R*1.65, R*1.02, ap);
  const sh   = lerp(R*0.40, R*1.18, ap);
  const riseY= lerp(0, -R*0.52, ap);
  const br   = 1 + Math.sin(tick*0.032)*0.026; // breathing scale

  X.save();
  X.translate(cx, cy+riseY);
  X.rotate(tilt);

  // ── leaf sprout ──
  if(ap>0.14){
    const la=ss(0.14,0.50,ap);
    X.save(); X.globalAlpha=la;
    X.translate(0,-sh*br*0.90);
    X.rotate(Math.sin(tick*0.055)*0.22);
    const lLen=R*0.30*la;
    X.beginPath(); X.moveTo(0,0); X.lineTo(0,-lLen*0.38);
    X.strokeStyle='rgba(92,138,62,0.80)'; X.lineWidth=1.6*DPR; X.stroke();
    X.beginPath();
    X.moveTo(0,-lLen*0.22);
    X.bezierCurveTo(-lLen*0.62,-lLen*0.55,-lLen*0.45,-lLen*0.95,0,-lLen);
    X.bezierCurveTo( lLen*0.45,-lLen*0.95, lLen*0.62,-lLen*0.55,0,-lLen*0.22);
    const lg=X.createLinearGradient(0,-lLen*0.22,0,-lLen);
    lg.addColorStop(0,'rgba(108,162,72,0.92)'); lg.addColorStop(1,'rgba(142,198,88,0.85)');
    X.fillStyle=lg; X.fill();
    X.beginPath(); X.moveTo(0,-lLen*0.22); X.lineTo(0,-lLen*0.98);
    X.strokeStyle='rgba(82,125,52,0.30)'; X.lineWidth=0.6*DPR; X.stroke();
    X.restore();
  }

  // ── main body ──
  {
    const bw=sw*br, bh=sh*br;
    const j1=Math.sin(tick*0.038+0.4)*bw*0.032;
    const j2=Math.sin(tick*0.031+2.1)*bw*0.025;
    const gc=(198+Math.sin(tick*0.028)*22)|0;

    // Rich amber-orange body gradient
    const bg=X.createRadialGradient(-bw*0.24,-bh*0.28,0,0,0,bw*1.22);
    bg.addColorStop(0,  `rgba(255,${gc},55,1)`);
    bg.addColorStop(0.26,'rgba(252,162,36,1)');
    bg.addColorStop(0.58,'rgba(228,115,14,1)');
    bg.addColorStop(0.86,'rgba(195,82,8,0.96)');
    bg.addColorStop(1,  'rgba(158,58,6,0.68)');
    X.beginPath(); blobPath(bw,bh,j1,j2); X.fillStyle=bg; X.fill();

    // Bottom shadow pass
    const bs=X.createLinearGradient(0,-bh,0,bh);
    bs.addColorStop(0.55,'rgba(100,40,4,0)'); bs.addColorStop(1,'rgba(100,40,4,0.28)');
    X.fillStyle=bs; X.beginPath(); blobPath(bw,bh,j1,j2); X.fill();

    // Top highlight
    const hl=X.createRadialGradient(-bw*0.32,-bh*0.38,0,-bw*0.05,-bh*0.12,bw*0.72);
    hl.addColorStop(0,'rgba(255,248,195,0.40)'); hl.addColorStop(1,'rgba(255,235,170,0)');
    X.fillStyle=hl; X.beginPath(); blobPath(bw,bh,j1,j2); X.fill();

    // Wrinkle / dried texture lines
    X.save();
    X.strokeStyle=`rgba(152,75,8,${lerp(0.22,0.10,ap)})`; X.lineWidth=0.9*DPR; X.lineCap='round';
    for(let i=-3;i<=3;i++){
      const lx=i*bw*0.18, wv=Math.sin(tick*0.025+i*0.7)*bw*0.038;
      X.beginPath();
      X.moveTo(lx+wv,-bh*0.80);
      X.quadraticCurveTo(lx+wv*0.5+bw*0.04, 0, lx-wv*0.4, bh*0.80);
      X.stroke();
    }
    // Horizontal band hints (mango fiber)
    X.strokeStyle=`rgba(148,70,8,${lerp(0.10,0.05,ap)})`; X.lineWidth=0.7*DPR;
    for(let i=-2;i<=2;i++){
      const ly=i*bh*0.26;
      X.beginPath(); X.moveTo(-bw*0.80,ly); X.quadraticCurveTo(0,ly+bh*0.055,bw*0.80,ly); X.stroke();
    }
    X.restore();
  }

  // ── eyes ──
  if(ap>0.20){
    const ea=ss(0.20,0.58,ap);
    const bw=sw*br, bh=sh*br;
    const er=lerp(0,bw*0.138,ea);
    const ey=-bh*0.10, es=bw*0.26;
    X.save(); X.globalAlpha=ea;
    [-es,es].forEach(ex=>{
      X.beginPath(); X.arc(ex,ey,er,0,Math.PI*2); X.fillStyle='rgba(255,252,238,0.96)'; X.fill();
      const px=Math.sin(tick*0.018)*er*0.20, py=Math.sin(tick*0.022+0.5)*er*0.16;
      X.beginPath(); X.arc(ex+px,ey+py,er*0.58,0,Math.PI*2); X.fillStyle='rgba(35,20,6,0.94)'; X.fill();
      X.beginPath(); X.arc(ex+px+er*0.22,ey+py-er*0.24,er*0.18,0,Math.PI*2); X.fillStyle='rgba(255,252,242,0.88)'; X.fill();
      X.beginPath(); X.arc(ex+px-er*0.20,ey+py+er*0.15,er*0.10,0,Math.PI*2); X.fillStyle='rgba(255,252,242,0.50)'; X.fill();
      // cheek blush
      const cg=X.createRadialGradient(ex*1.30,ey+er*1.1,0,ex*1.30,ey+er*1.1,er*1.4);
      cg.addColorStop(0,'rgba(238,138,62,0.28)'); cg.addColorStop(1,'rgba(238,138,62,0)');
      X.fillStyle=cg; X.beginPath(); X.arc(ex*1.30,ey+er*1.1,er*1.4,0,Math.PI*2); X.fill();
    });
    // droopy lids — sleepy
    const droop=lerp(0.55,0.28,ap);
    const blink=(Math.abs(Math.sin(tick*0.009))<0.05)?1:0;
    const lid=lerp(droop,1.0,blink);
    X.fillStyle='rgba(225,118,18,1)';
    [-es,es].forEach(ex=>{
      X.beginPath();
      X.moveTo(ex-er*1.08,ey);
      X.bezierCurveTo(ex-er*0.5,ey-er*2.0*lid,ex+er*0.5,ey-er*2.0*lid,ex+er*1.08,ey);
      X.fill();
    });
    X.restore();
  }

  // ── arm stubs ──
  if(ap>0.42){
    const aa=ss(0.42,0.80,ap);
    const bw=sw*br, bh=sh*br;
    const wav=Math.sin(tick*0.072)*0.30;
    X.save(); X.globalAlpha=aa;
    [-1,1].forEach(s=>{
      X.save(); X.translate(s*bw*0.90,bh*0.05); X.rotate(s*0.52+wav*s);
      const ag=X.createRadialGradient(0,0,0,0,0,bw*0.22);
      ag.addColorStop(0,'rgba(248,178,42,0.96)'); ag.addColorStop(1,'rgba(205,112,16,0.72)');
      X.beginPath(); X.ellipse(0,0,bw*0.115,bw*0.23,0,0,Math.PI*2); X.fillStyle=ag; X.fill();
      X.restore();
    });
    X.restore();
  }

  // ── legs + round feet ──
  if(ap>0.56){
    const la=ss(0.56,0.88,ap);
    const bw=sw*br, bh=sh*br;
    const sw2=Math.sin(tick*0.092)*0.10;
    X.save(); X.globalAlpha=la;
    [-bw*0.30,bw*0.30].forEach((lx,i)=>{
      const lg=X.createRadialGradient(lx,bh*0.82,0,lx,bh*0.82,bw*0.25);
      lg.addColorStop(0,'rgba(242,168,36,0.96)'); lg.addColorStop(1,'rgba(202,115,16,0.68)');
      X.beginPath(); X.ellipse(lx,bh*0.82,bw*0.15,bw*0.34,i===0?-sw2:sw2,0,Math.PI*2); X.fillStyle=lg; X.fill();
      X.beginPath(); X.ellipse(lx,bh*1.32,bw*0.22,bw*0.115,0,0,Math.PI*2); X.fillStyle='rgba(215,145,26,0.88)'; X.fill();
    });
    X.restore();
  }

  X.restore();

  // night glow halo
  if(np>0.08&&ap>0.08){
    const gl=X.createRadialGradient(cx,cy+riseY,0,cx,cy+riseY,sw*2.6);
    gl.addColorStop(0,`rgba(255,195,62,${0.20*np*ap})`); gl.addColorStop(1,'rgba(255,162,35,0)');
    X.fillStyle=gl; X.beginPath(); X.arc(cx,cy+riseY,sw*2.6,0,Math.PI*2); X.fill();
  }
  // water reflection shadow
  const rs=X.createRadialGradient(cx,fy+2*DPR,0,cx,fy+2*DPR,sw*1.6);
  rs.addColorStop(0,`rgba(135,95,16,${0.16+ap*0.08})`); rs.addColorStop(1,'rgba(135,95,16,0)');
  X.fillStyle=rs; X.beginPath(); X.ellipse(cx,fy+2*DPR,sw*1.6,sw*0.28,0,0,Math.PI*2); X.fill();
}

// ─── MANGO CAT: chubby sleepy Garfield-feeling dried-mango cat ─
// Day (ap=0): flat mango slice with tiny ear nubs + thin tail hint
// Night (ap=1): round chubby cat body, big folded ears, sleepy face, paws, fluffy tail
function drawMangoKitten(kx0, ky0, ap, np) {
  const bob   = Math.sin(tick*0.031+1.8)*2.4*DPR;
  const sway  = Math.sin(tick*0.019+2.5)*0.022*ap;
  const cy    = ky0 + bob;
  const cx    = kx0 + Math.sin(tick*0.022+2.5)*2.0*DPR;
  const br    = 1 + Math.sin(tick*0.038+1.4)*0.022; // breathing

  // Base unit — grows from tiny slice to full cat
  const R = lerp(H*0.020, H*0.052, ap);

  // Body dims: wide flat slice → chubby round cat
  const bw = lerp(R*1.62, R*1.05, ap) * br;
  const bh = lerp(R*0.38, R*0.90, ap) * br;

  const gc = (198 + Math.sin(tick*0.031+1.4)*22)|0;

  X.save();
  X.translate(cx, cy);
  X.rotate(sway);

  // ── water shadow under the cat ──
  {
    const sg=X.createRadialGradient(0,bh*0.88,0,0,bh*1.05,bw*1.6);
    sg.addColorStop(0,`rgba(70,48,8,${0.18+ap*0.06})`); sg.addColorStop(1,'rgba(70,48,8,0)');
    X.fillStyle=sg; X.beginPath(); X.ellipse(0,bh*0.88,bw*1.45,bh*0.28,0,0,Math.PI*2); X.fill();
  }

  // ── tail — drawn behind body, lazy curl to the right ──
  {
    const ta   = lerp(0.35, 0.95, ap);
    const tw   = lerp(Math.max(R*0.06,1.8*DPR), R*0.30, ap);
    const curl = Math.sin(tick*0.065+0.9) * lerp(0.10, 0.55, ap);

    // Tail gradient strip (dried mango curl)
    const tg=X.createLinearGradient(bw*0.5,0,bw*2.8,-R*1.2);
    tg.addColorStop(0,'rgba(218,148,28,0.95)');
    tg.addColorStop(0.5,'rgba(238,172,38,0.88)');
    tg.addColorStop(1,'rgba(248,192,52,0.65)');

    X.save(); X.globalAlpha=ta;
    X.beginPath();
    X.moveTo(bw*0.52, bh*0.32);
    X.bezierCurveTo(
      bw*(1.55+curl*0.3), bh*(0.85+curl*0.15),
      bw*(2.55+curl*0.5), bh*(0.10+curl*0.35),
      bw*(2.28+curl*0.4), R*(-0.72+curl*0.25)
    );
    X.strokeStyle=tg; X.lineWidth=tw; X.lineCap='round'; X.stroke();

    // Fluffy tail tip blob
    const tipX=bw*(2.28+curl*0.4), tipY=R*(-0.72+curl*0.25);
    const tipG=X.createRadialGradient(tipX,tipY,0,tipX,tipY,tw*1.8);
    tipG.addColorStop(0,'rgba(252,205,58,0.88)'); tipG.addColorStop(1,'rgba(245,185,42,0)');
    X.fillStyle=tipG; X.beginPath(); X.arc(tipX,tipY,tw*1.6,0,Math.PI*2); X.fill();
    X.restore();
  }

  // ── ears — folded mango-piece triangles, behind head ──
  {
    const eOp  = lerp(0.55, 1.0, ap);
    const earH = lerp(R*0.40, R*1.18, ap);
    const earW = lerp(R*0.22, R*0.52, ap);
    const headY= lerp(-bh*0.52, -bh*0.78, ap); // where head sits

    X.save(); X.globalAlpha=eOp;
    [-1,1].forEach(s=>{
      const ex = s * lerp(bw*0.42, R*0.62, ap);
      const ey = headY;

      // Outer ear — organic folded shape, not just a triangle
      const eg=X.createRadialGradient(ex,ey-earH*0.35,0,ex,ey,earH*1.1);
      eg.addColorStop(0,'rgba(248,190,45,0.97)');
      eg.addColorStop(0.55,'rgba(228,145,20,0.95)');
      eg.addColorStop(1,'rgba(192,98,10,0.78)');
      X.beginPath();
      X.moveTo(ex - s*earW*0.58, ey);
      X.bezierCurveTo(ex - s*earW*0.30, ey-earH*0.42, ex + s*earW*0.08, ey-earH*0.96, ex + s*earW*0.12, ey-earH*0.92);
      X.bezierCurveTo(ex + s*earW*0.48, ey-earH*0.52, ex + s*earW*0.62, ey-earH*0.08, ex + s*earW*0.55, ey);
      X.closePath();
      X.fillStyle=eg; X.fill();

      // Inner ear — peachy blush, grows in with transformation
      const ia=ss(0.22,0.65,ap);
      if(ia>0){
        X.save(); X.globalAlpha=ia*0.75;
        X.beginPath();
        X.moveTo(ex - s*earW*0.28, ey-earH*0.08);
        X.bezierCurveTo(ex - s*earW*0.10, ey-earH*0.44, ex + s*earW*0.06, ey-earH*0.82, ex + s*earW*0.10, ey-earH*0.76);
        X.bezierCurveTo(ex + s*earW*0.32, ey-earH*0.44, ex + s*earW*0.36, ey-earH*0.08, ex + s*earW*0.28, ey-earH*0.04);
        X.closePath();
        X.fillStyle='rgba(255,182,148,0.58)'; X.fill();
        X.restore();
      }
    });
    X.restore();
  }

  // ── body — chubby organic blob ──
  {
    const bg=X.createRadialGradient(-bw*0.28,-bh*0.30,0,0,0,bw*1.35);
    bg.addColorStop(0,  `rgba(255,${gc},52,1)`);
    bg.addColorStop(0.25,'rgba(252,162,35,1)');
    bg.addColorStop(0.58,'rgba(228,115,15,1)');
    bg.addColorStop(0.84,'rgba(195,82,8,0.96)');
    bg.addColorStop(1,  'rgba(155,55,5,0.68)');

    const j1=Math.sin(tick*0.035+0.5)*bw*0.035;
    const j2=Math.sin(tick*0.029+2.2)*bw*0.025;
    X.beginPath(); blobPath(bw,bh,j1,j2); X.fillStyle=bg; X.fill();

    // underside shadow
    const us=X.createLinearGradient(0,-bh,0,bh);
    us.addColorStop(0.55,'rgba(105,42,4,0)'); us.addColorStop(1,'rgba(105,42,4,0.30)');
    X.fillStyle=us; X.beginPath(); blobPath(bw,bh,j1,j2); X.fill();

    // top highlight sheen (drifts gently)
    const hlx=Math.sin(tick*0.022+2.5)*bw*0.18;
    const hl=X.createRadialGradient(-bw*0.30+hlx,-bh*0.38,0,hlx,-bh*0.08,bw*0.72);
    hl.addColorStop(0,'rgba(255,248,195,0.38)'); hl.addColorStop(1,'rgba(255,232,168,0)');
    X.fillStyle=hl; X.beginPath(); blobPath(bw,bh,j1,j2); X.fill();

    // Dried-mango wrinkle texture lines on body
    X.save();
    X.strokeStyle=`rgba(155,72,6,${lerp(0.20,0.09,ap)})`; X.lineWidth=0.85*DPR; X.lineCap='round';
    for(let i=-2;i<=2;i++){
      const lx=i*bw*0.22, wv=Math.sin(tick*0.028+i*0.9)*bw*0.036;
      X.beginPath();
      X.moveTo(lx+wv,-bh*0.76);
      X.quadraticCurveTo(lx+wv*0.4+bw*0.035,0,lx-wv*0.3,bh*0.76);
      X.stroke();
    }
    // Tabby stripe hints — horizontal, very subtle
    X.strokeStyle=`rgba(182,95,12,${lerp(0.08,0.06,ap)})`; X.lineWidth=1.4*DPR;
    for(let i=-1;i<=1;i++){
      const ly=i*bh*0.32;
      X.beginPath(); X.moveTo(-bw*0.78,ly); X.quadraticCurveTo(0,ly+bh*0.055,bw*0.78,ly); X.stroke();
    }
    X.restore();
  }

  // ── head — round chubby, sits on top of body ──
  {
    const hAmt=ss(0.10,0.55,ap);
    if(hAmt>0.02){
      const hr  = lerp(R*0.48, R*0.96, ap);
      const hy  = lerp(-bh*0.52, -bh*0.80, ap);

      X.save(); X.globalAlpha=hAmt;

      const hg=X.createRadialGradient(-hr*0.30,hy-hr*0.30,0,0,hy,hr*1.22);
      hg.addColorStop(0,  `rgba(255,${(gc+8)|0},58,1)`);
      hg.addColorStop(0.30,'rgba(252,165,38,1)');
      hg.addColorStop(0.65,'rgba(228,118,16,1)');
      hg.addColorStop(1,  'rgba(188,80,8,0.88)');

      // Slightly squashed organic head shape
      X.beginPath();
      X.moveTo(0,hy-hr*0.94);
      X.bezierCurveTo( hr*0.64,hy-hr*0.88, hr*0.98,hy-hr*0.38, hr*0.98,hy+hr*0.10);
      X.bezierCurveTo( hr*0.98,hy+hr*0.65, hr*0.58,hy+hr*0.94, 0,hy+hr*0.94);
      X.bezierCurveTo(-hr*0.58,hy+hr*0.94,-hr*0.98,hy+hr*0.65,-hr*0.98,hy+hr*0.10);
      X.bezierCurveTo(-hr*0.98,hy-hr*0.38,-hr*0.64,hy-hr*0.88, 0,hy-hr*0.94);
      X.fillStyle=hg; X.fill();

      // Head wrinkle lines
      X.strokeStyle='rgba(152,72,6,0.13)'; X.lineWidth=0.7*DPR; X.lineCap='round';
      for(let i=-1;i<=1;i++){
        const lx=i*hr*0.30;
        X.beginPath(); X.moveTo(lx,hy-hr*0.68); X.quadraticCurveTo(lx+hr*0.04,hy,lx-hr*0.02,hy+hr*0.68); X.stroke();
      }

      // Head top highlight
      const hhl=X.createRadialGradient(-hr*0.34,hy-hr*0.36,0,-hr*0.08,hy-hr*0.10,hr*0.72);
      hhl.addColorStop(0,'rgba(255,248,198,0.34)'); hhl.addColorStop(1,'rgba(255,232,172,0)');
      X.fillStyle=hhl;
      X.beginPath();
      X.moveTo(0,hy-hr*0.94);
      X.bezierCurveTo( hr*0.64,hy-hr*0.88, hr*0.98,hy-hr*0.38, hr*0.98,hy+hr*0.10);
      X.bezierCurveTo( hr*0.98,hy+hr*0.65, hr*0.58,hy+hr*0.94, 0,hy+hr*0.94);
      X.bezierCurveTo(-hr*0.58,hy+hr*0.94,-hr*0.98,hy+hr*0.65,-hr*0.98,hy+hr*0.10);
      X.bezierCurveTo(-hr*0.98,hy-hr*0.38,-hr*0.64,hy-hr*0.88, 0,hy-hr*0.94);
      X.fill();

      // Chubby cheek pouches — warm blush circles
      const ca=ss(0.40,0.80,ap);
      if(ca>0){
        X.save(); X.globalAlpha=ca*0.55;
        [-1,1].forEach(s=>{
          const cg=X.createRadialGradient(s*hr*0.64,hy+hr*0.24,0,s*hr*0.64,hy+hr*0.24,hr*0.44);
          cg.addColorStop(0,'rgba(248,155,68,0.42)'); cg.addColorStop(1,'rgba(245,140,58,0)');
          X.fillStyle=cg; X.beginPath(); X.arc(s*hr*0.64,hy+hr*0.24,hr*0.44,0,Math.PI*2); X.fill();
        });
        X.restore();
      }

      X.restore();
    }
  }

  // ── front paws — two tiny rounded stubs tucked at bottom ──
  {
    const pa=ss(0.52,0.90,ap);
    if(pa>0){
      X.save(); X.globalAlpha=pa;
      const pw=R*0.28, ph=R*0.16;
      [-1,1].forEach(s=>{
        const px=s*bw*0.52, py=bh*0.68;
        const pg=X.createRadialGradient(px,py-ph*0.3,0,px,py,pw*1.3);
        pg.addColorStop(0,'rgba(248,182,42,1)');
        pg.addColorStop(0.55,'rgba(222,132,18,0.98)');
        pg.addColorStop(1,'rgba(188,92,8,0.68)');
        // Rounded stubby paw
        X.beginPath();
        X.moveTo(px-pw,py-ph*0.18);
        X.bezierCurveTo(px-pw,py-ph,px+pw,py-ph,px+pw,py-ph*0.18);
        X.bezierCurveTo(px+pw,py+ph*0.65,px+pw*0.48,py+ph,px,py+ph*0.82);
        X.bezierCurveTo(px-pw*0.48,py+ph,px-pw,py+ph*0.65,px-pw,py-ph*0.18);
        X.fillStyle=pg; X.fill();
        // Tiny toe dividers
        X.strokeStyle='rgba(148,68,6,0.22)'; X.lineWidth=0.6*DPR;
        [-1,0,1].forEach(t=>{
          X.beginPath(); X.moveTo(px+t*pw*0.28,py-ph*0.05); X.lineTo(px+t*pw*0.28,py+ph*0.52); X.stroke();
        });
      });
      X.restore();
    }
  }

  // ── eyes — sleepy half-closed, Garfield-style drooped lids ──
  {
    const ea=ss(0.30,0.72,ap);
    if(ea>0.02){
      const hr  = lerp(R*0.48, R*0.96, ap);
      const hy  = lerp(-bh*0.52, -bh*0.80, ap);
      const er  = hr*0.175;
      const ex  = hr*0.30;
      const ey  = hy+hr*0.06;

      X.save(); X.globalAlpha=ea;
      [-ex,ex].forEach(exx=>{
        // Eye white
        X.beginPath(); X.arc(exx,ey,er,0,Math.PI*2);
        X.fillStyle='rgba(255,252,238,0.96)'; X.fill();
        // Vertical cat slit pupil
        X.beginPath(); X.ellipse(exx,ey,er*0.24,er*0.78,0,0,Math.PI*2);
        X.fillStyle='rgba(32,18,4,0.94)'; X.fill();
        // Bright eye shine
        X.beginPath(); X.arc(exx+er*0.24,ey-er*0.28,er*0.19,0,Math.PI*2);
        X.fillStyle='rgba(255,252,242,0.90)'; X.fill();
        X.beginPath(); X.arc(exx-er*0.20,ey+er*0.18,er*0.10,0,Math.PI*2);
        X.fillStyle='rgba(255,252,242,0.52)'; X.fill();
      });

      // Heavy drooping lids — the key Garfield sleepy look
      const droop = lerp(0.48, 0.32, ap); // more open as ap grows — cat is waking up
      const blink = (Math.abs(Math.sin(tick*0.008+(exx=>exx)*0)))<0.055 ? 1:0;
      const lid   = lerp(droop, 1.0, blink);
      X.fillStyle=`rgba(228,120,18,1)`;
      [-ex,ex].forEach(exx=>{
        X.beginPath();
        X.moveTo(exx-er*1.08,ey);
        X.bezierCurveTo(exx-er*0.5,ey-er*2.05*lid, exx+er*0.5,ey-er*2.05*lid,exx+er*1.08,ey);
        X.fill();
        // Lid crease line
        X.beginPath();
        X.moveTo(exx-er*1.05,ey);
        X.bezierCurveTo(exx,ey-er*0.45, exx,ey-er*0.45,exx+er*1.05,ey);
        X.strokeStyle='rgba(148,68,6,0.50)'; X.lineWidth=0.8*DPR; X.lineCap='round'; X.stroke();
      });
      X.restore();
    }
  }

  // ── nose + whiskers + tiny grumpy mouth ──
  {
    const na=ss(0.55,0.85,ap);
    if(na>0.02){
      const hr = lerp(R*0.48, R*0.96, ap);
      const hy = lerp(-bh*0.52, -bh*0.80, ap);
      X.save(); X.globalAlpha=na;
      const ny=hy+hr*0.34;

      // Nose — small soft triangle
      X.beginPath();
      X.moveTo(0,ny-hr*0.065);
      X.lineTo(-hr*0.095,ny+hr*0.075); X.lineTo(hr*0.095,ny+hr*0.075);
      X.closePath();
      const ng=X.createRadialGradient(0,ny,0,0,ny,hr*0.15);
      ng.addColorStop(0,'rgba(225,135,78,0.90)'); ng.addColorStop(1,'rgba(208,118,65,0.78)');
      X.fillStyle=ng; X.fill();

      // Philtrum line
      X.beginPath(); X.moveTo(0,ny+hr*0.075); X.lineTo(0,ny+hr*0.135);
      X.strokeStyle='rgba(175,90,22,0.45)'; X.lineWidth=0.7*DPR; X.lineCap='round'; X.stroke();

      // Grumpy-cute flat-line mouth
      X.beginPath();
      X.moveTo(-hr*0.135,ny+hr*0.138);
      X.bezierCurveTo(-hr*0.07,ny+hr*0.115, hr*0.07,ny+hr*0.115, hr*0.135,ny+hr*0.138);
      X.strokeStyle='rgba(172,85,18,0.58)'; X.lineWidth=0.85*DPR; X.stroke();

      // Whiskers — 3 each side, slightly drooping (sleepy)
      X.strokeStyle='rgba(245,228,182,0.52)'; X.lineWidth=0.7*DPR; X.lineCap='round';
      const wsets=[[-1,0.08],[-1,-0.06],[-1,0.22],[1,0.08],[1,-0.06],[1,0.22]];
      wsets.forEach(([s,yo])=>{
        const wy=ny+yo*hr*0.22;
        X.beginPath();
        X.moveTo(s*hr*0.18,wy);
        X.bezierCurveTo(s*hr*0.45,wy+s*hr*0.02, s*hr*0.72,wy+hr*0.04, s*hr*0.86,wy+hr*0.06);
        X.stroke();
      });
      X.restore();
    }
  }

  // night glow
  if(np>0.08&&ap>0.08){
    const gl=X.createRadialGradient(0,0,0,0,0,R*3.8);
    gl.addColorStop(0,`rgba(248,188,55,${0.16*np*ap})`); gl.addColorStop(1,'rgba(222,155,32,0)');
    X.fillStyle=gl; X.beginPath(); X.arc(0,0,R*3.8,0,Math.PI*2); X.fill();
  }

  X.restore();

  // water shadow stripe
  const rs2=X.createRadialGradient(cx,ky0+1*DPR,0,cx,ky0+1*DPR,bw*1.5);
  rs2.addColorStop(0,`rgba(132,95,14,${0.12+ap*0.05})`); rs2.addColorStop(1,'rgba(132,95,14,0)');
  X.fillStyle=rs2; X.beginPath(); X.ellipse(cx,ky0+1*DPR,bw*1.5,bw*0.26,0,0,Math.PI*2); X.fill();
}

// ─── ENVIRONMENT ─────────────────────────────────────────────
function drawSky(p) {
  const g=X.createLinearGradient(0,0,0,H*.46);
  g.addColorStop(0,rgb(p.sT)); g.addColorStop(.5,rgb(lc(p.sT,p.sB,.55))); g.addColorStop(1,rgb(p.sB));
  X.fillStyle=g; X.fillRect(0,0,W,H*.46);
  const c=pct();

  if(c<PH.sunset){
    // Daytime sun glow (top right)
    const a=c<PH.day?.14:.14*(1-ss(PH.day,PH.sunset,c)*.5);
    const sg=X.createRadialGradient(W*.8,H*.04,0,W*.8,H*.04,W*.6);
    sg.addColorStop(0,`rgba(255,242,175,${a})`); sg.addColorStop(1,'rgba(240,210,128,0)');
    X.fillStyle=sg; X.fillRect(0,0,W,H*.46);
  }

  // Sunset phase: c between PH.day and PH.dusk
  if(c>PH.day && c<PH.dusk){
    // sunsetAmt peaks in the middle of PH.day→PH.dusk
    const sa = c<PH.sunset
      ? ss(PH.day, PH.sunset, c)
      : 1 - ss(PH.sunset, PH.dusk, c);

    // Soft sun disc near the horizon — warm peach blob, not a hard circle
    const sx=W*0.72, sy=H*0.36;
    const sun=X.createRadialGradient(sx,sy,0,sx,sy,W*0.38);
    sun.addColorStop(0,   `rgba(255,230,165,${sa*0.36})`);
    sun.addColorStop(0.18,`rgba(252,200,118,${sa*0.26})`);
    sun.addColorStop(0.50,`rgba(245,172,88, ${sa*0.13})`);
    sun.addColorStop(1,    'rgba(238,148,65,0)');
    X.fillStyle=sun; X.fillRect(0,0,W,H*.46);

    // Warm horizon band — the brightest part right at the skyline
    const hb=X.createLinearGradient(0,H*0.26,0,H*0.46);
    hb.addColorStop(0,  `rgba(252,205,128,0)`);
    hb.addColorStop(0.62,`rgba(254,210,130,${sa*0.16})`);
    hb.addColorStop(1,   `rgba(255,215,135,${sa*0.26})`);
    X.fillStyle=hb; X.fillRect(0,H*0.26,W,H*0.20);

    // Pale golden-pink wash across the whole sky, fades upward
    const sw=X.createLinearGradient(0,0,0,H*0.46);
    sw.addColorStop(0,   'rgba(245,185,115,0)');
    sw.addColorStop(0.55,`rgba(250,192,118,${sa*0.07})`);
    sw.addColorStop(1,   `rgba(252,198,122,${sa*0.14})`);
    X.fillStyle=sw; X.fillRect(0,0,W,H*.46);
  }
}

function drawStarsMoon(n) {
  if(n<.02) return;
  stars.forEach(s=>{
    const tw=Math.sin(tick*s.tw+s.ph)*.35+.65;
    X.beginPath(); X.arc(s.x*W,s.y*H,s.r*DPR,0,Math.PI*2);
    X.fillStyle=`rgba(215,228,255,${n*tw*.7})`; X.fill();
  });
  const mx=W*.76, my=H*.13, mr=19*DPR;
  const mg=X.createRadialGradient(mx,my,mr*.4,mx,my,mr*3.8);
  mg.addColorStop(0,`rgba(205,222,255,${n*.18})`); mg.addColorStop(1,'rgba(175,205,255,0)');
  X.fillStyle=mg; X.beginPath(); X.arc(mx,my,mr*3.8,0,Math.PI*2); X.fill();
  const mb=X.createRadialGradient(mx-mr*.2,my-mr*.2,0,mx,my,mr);
  mb.addColorStop(0,`rgba(242,248,255,${n})`); mb.addColorStop(.7,`rgba(225,235,255,${n*.97})`); mb.addColorStop(1,`rgba(198,215,255,${n*.9})`);
  X.fillStyle=mb; X.beginPath(); X.arc(mx,my,mr,0,Math.PI*2); X.fill();
  const rg=X.createLinearGradient(0,H*.5,0,H*.82);
  rg.addColorStop(0,`rgba(185,210,255,${n*.12})`); rg.addColorStop(1,'rgba(165,195,255,0)');
  X.fillStyle=rg; X.beginPath(); X.ellipse(mx,H*.66,11*DPR,52*DPR,0,0,Math.PI*2); X.fill();
}

function drawWater(p) {
  const wY=H*.41;
  const c=pct();
  const isN=c>PH.dusk;

  // Base water gradient — same color family, just more stops for depth
  const g=X.createLinearGradient(0,wY,0,H);
  g.addColorStop(0,   rgb(p.wT));
  g.addColorStop(0.10,rgb(lc(p.wT,p.wB,0.15)));
  g.addColorStop(0.32,rgb(lc(p.wT,p.wB,0.42)));
  g.addColorStop(0.68,rgb(lc(p.wT,p.wB,0.78)));
  g.addColorStop(1,   rgb(p.wB));
  X.fillStyle=g; X.fillRect(0,wY,W,H);

  // Warm daytime overlay
  if(c<PH.dusk){
    const sc=X.createLinearGradient(0,wY,0,H*.85);
    sc.addColorStop(0,`rgba(255,228,148,0.042)`); sc.addColorStop(1,'rgba(255,210,105,0)');
    X.fillStyle=sc; X.fillRect(0,wY,W,H);
  }

  // Sunset light reflected onto water surface
  if(c>PH.day && c<PH.dusk){
    const sa = c<PH.sunset
      ? ss(PH.day, PH.sunset, c)
      : 1 - ss(PH.sunset, PH.dusk, c);

    // Warm horizontal tint on the upper water — as if the peach sky is casting light
    const ref=X.createLinearGradient(0,wY,0,wY+H*0.28);
    ref.addColorStop(0,  `rgba(252,205,118,${sa*0.13})`);
    ref.addColorStop(0.5,`rgba(248,195,108,${sa*0.07})`);
    ref.addColorStop(1,   'rgba(245,185,98,0)');
    X.fillStyle=ref; X.fillRect(0,wY,W,H*0.28);

    // Sun path on water — soft radial pool of warm light on the right side
    const px=W*0.72;
    const path=X.createRadialGradient(px,wY,0,px,wY+H*0.30,W*0.28);
    path.addColorStop(0,  `rgba(255,220,148,${sa*0.10})`);
    path.addColorStop(0.45,`rgba(252,205,128,${sa*0.05})`);
    path.addColorStop(1,   'rgba(248,188,108,0)');
    X.fillStyle=path; X.fillRect(0,wY,W,H*0.55);
  }

  // Near-surface luminance band (sky reflected just below waterline)
  const surfBand=X.createLinearGradient(0,wY,0,wY+H*0.10);
  surfBand.addColorStop(0, isN ? 'rgba(62,92,158,0.11)' : 'rgba(205,232,218,0.09)');
  surfBand.addColorStop(1, isN ? 'rgba(22,40,85,0)'     : 'rgba(162,210,190,0)');
  X.fillStyle=surfBand; X.fillRect(0,wY,W,H*0.10);

  // Subtle depth-variation bands — slow undulating darker/lighter layers
  // These break up the flat look and hint at water depth
  for(let i=0;i<4;i++){
    const bandY = wY + H*(0.10+i*0.19) + Math.sin(tick*0.007+i*1.3)*H*0.012;
    const bAl   = 0.024 + Math.sin(tick*0.013+i*0.8)*0.008;
    const bg=X.createLinearGradient(0,bandY-H*0.038,0,bandY+H*0.038);
    bg.addColorStop(0,'rgba(0,0,0,0)');
    bg.addColorStop(0.5, isN
      ? `rgba(12,24,58,${bAl})`
      : `rgba(62,108,88,${bAl})`);
    bg.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=bg; X.fillRect(0,bandY-H*0.038,W,H*0.076);
  }
}

function drawWaterLine(p) {
  const wY=H*.41, sh=Math.sin(tick*.018)*.1+.9;
  const isN=pct()>PH.dusk;
  const lc2=isN?[175,212,255]:[255,252,210];
  const g=X.createLinearGradient(0,wY-2*DPR,0,wY+4*DPR);
  g.addColorStop(0,rgba(lc2,.20*sh)); g.addColorStop(.4,rgba(lc2,.38*sh)); g.addColorStop(1,rgba(p.wT,.07));
  X.fillStyle=g; X.fillRect(0,wY-1.5*DPR,W,5*DPR);
}

// Visible flowing waves — the main sense of water moving
function drawFlowWaves(p) {
  const isN = pct() > PH.dusk;
  flowWaves.forEach(fw => {
    const baseY = fw.yFrac * H;
    X.beginPath(); X.moveTo(0, baseY);
    for(let x = 0; x <= W; x += 3) {
      const y = baseY
        + Math.sin(x * fw.freq / DPR + tick * fw.spd + fw.ph) * fw.amp * DPR
        + Math.sin(x * fw.freq / DPR * 1.88 - tick * fw.spd * 0.60 + fw.ph + 1.9) * fw.amp * DPR * 0.36;
      X.lineTo(x, y);
    }
    const al = isN ? fw.al * 0.52 : fw.al;
    X.strokeStyle = isN ? `rgba(128,182,242,${al})` : `rgba(255,255,245,${al})`;
    X.lineWidth = 0.85 * DPR;
    X.stroke();
  });
}

// Creek current streaks — drifting horizontal wisps that feel like slow current
function drawCreekCurrents() {
  const isN = pct() > PH.dusk;
  creekStreaks.forEach(s=>{
    const xPos = ((s.xBase + tick*s.spd) % 1.14 - 0.07) * W;
    const yPos = s.yFrac*H + Math.sin(tick*s.wavSpd + s.ph)*s.wavY*H;
    const len  = s.len * W;
    if(xPos+len < -W*0.05 || xPos > W*1.05) return;

    // Feathered streak: transparent at both ends, solid in the middle
    const sg = X.createLinearGradient(xPos,yPos,xPos+len,yPos);
    const midCol = isN ? `rgba(52,82,148,${s.al})` : `rgba(168,215,195,${s.al})`;
    const endCol = isN ? 'rgba(22,38,80,0)'        : 'rgba(128,184,162,0)';
    sg.addColorStop(0,    endCol);
    sg.addColorStop(0.14, midCol);
    sg.addColorStop(0.86, midCol);
    sg.addColorStop(1,    endCol);

    // Gentle undulation along the streak length
    const midY  = yPos + Math.sin(tick*s.wavSpd*1.4+s.ph+1.1)*s.wavY*H*0.55;
    const endY  = yPos + Math.sin(tick*s.wavSpd*0.9+s.ph+2.3)*s.wavY*H*0.30;

    X.beginPath();
    X.moveTo(xPos, yPos);
    X.bezierCurveTo(xPos+len*0.32, midY, xPos+len*0.68, yPos, xPos+len, endY);
    X.strokeStyle = sg;
    X.lineWidth   = s.thick * DPR;
    X.lineCap     = 'round';
    X.stroke();
  });
}

// Surface shimmers — tiny glinting ellipses just at the waterline
function drawSurfaceShimmer(p) {
  const isN = pct() > PH.dusk;
  shimmers.forEach(s=>{
    const x = ((s.x + tick*s.spd) % 1.08 - 0.04) * W;
    const y = s.yFrac * H + Math.sin(tick*s.tw*0.55+s.ph)*1.5*DPR;
    const twinkle = (Math.sin(tick*s.tw + s.ph)*0.5+0.5);
    const al = s.al * twinkle;
    if(al < 0.005) return;
    const col = isN ? [168,205,255] : [235,252,238];
    const sg = X.createRadialGradient(x,y,0,x,y,s.w*DPR);
    sg.addColorStop(0, rgba(col, al));
    sg.addColorStop(1, rgba(col, 0));
    X.fillStyle = sg;
    X.beginPath();
    X.ellipse(x, y, s.w*DPR, s.h*DPR, 0, 0, Math.PI*2);
    X.fill();
  });
}

// Mango ripples — soft expanding rings around floating pieces
function drawMangoRipples() {
  const isN = pct() > PH.dusk;
  const ringCol = isN ? [82,122,198] : [192,228,212];

  // Rings around drifting floater pieces
  floaters.forEach(f=>{
    const x = ((f.xStart - tick*f.spd) % 1.15) * W;
    if(x < -W*0.12 || x > W*1.12) return;
    const y  = f.yFrac*H;
    const r0 = W*0.014*f.scale;
    for(let i=0;i<2;i++){
      const phase  = (tick*0.016 + i*1.05 + f.bob) % (Math.PI*2);
      const expand = Math.sin(phase)*0.5+0.5;
      const rr     = r0*(1.0+expand*1.6);
      const al     = (1-expand)*0.038 * (isN?0.55:1.0);
      if(al<0.003) continue;
      X.beginPath();
      X.ellipse(x, y+1.5*DPR, rr, rr*0.25, 0, 0, Math.PI*2);
      X.strokeStyle = rgba(ringCol, al);
      X.lineWidth   = 0.55*DPR;
      X.stroke();
    }
  });

  // Rings around the two main mango characters
  const mainX = W*0.42 + Math.sin(tick*0.006)*5*DPR;
  const catX  = mainX + W*0.18 + Math.sin(tick*0.005+1.4)*4*DPR;
  [mainX, catX].forEach((mx,ci)=>{
    const my = H*0.415;
    for(let i=0;i<3;i++){
      const phase  = (tick*0.012 + i*0.9 + ci*1.6) % (Math.PI*2);
      const expand = Math.sin(phase)*0.5+0.5;
      const rr     = W*0.030*(0.8+expand*1.4);
      const al     = (1-expand)*0.032 * (isN?0.52:1.0);
      if(al<0.003) continue;
      X.beginPath();
      X.ellipse(mx, my+2*DPR, rr, rr*0.20, 0, 0, Math.PI*2);
      X.strokeStyle = rgba(ringCol, al);
      X.lineWidth   = 0.55*DPR;
      X.stroke();
    }
  });
}

function drawLights(p) {
  lights.forEach(l=>{
    const pulse=Math.sin(tick*.45+l.ph)*.5+.5;
    const x=((l.x+tick*l.spd*.07)%1)*W;
    const y=l.y*H+Math.sin(tick*.18+l.ph)*9*DPR;
    X.save(); X.translate(x,y); X.rotate(l.ang+Math.sin(tick*.06+l.ph)*.07);
    const rg=X.createRadialGradient(0,0,0,0,0,l.w*DPR);
    const a=l.al*(.5+pulse*.5);
    rg.addColorStop(0,rgba(p.lC,a)); rg.addColorStop(.4,rgba(p.lC,a*.36)); rg.addColorStop(1,rgba(p.lC,0));
    X.fillStyle=rg; X.beginPath(); X.ellipse(0,0,l.w*DPR,l.h*DPR,0,0,Math.PI*2); X.fill(); X.restore();
  });
}

function drawRipples(p) {
  const isN=pct()>PH.dusk;
  rips.forEach(r=>{
    const y=r.yf*H; X.beginPath(); X.moveTo(0,y);
    for(let x=0;x<=W;x+=5){
      const w1=Math.sin(x*r.freq/DPR+tick*r.spd)*r.amp*DPR;
      const w2=Math.sin(x*r.freq/DPR*1.65-tick*r.spd*.52+1.3)*r.amp*DPR*.32;
      X.lineTo(x,y+w1+w2);
    }
    X.strokeStyle=isN?`rgba(115,170,238,${r.al*.5})`:`rgba(255,255,255,${r.al})`;
    X.lineWidth=.6*DPR; X.stroke();
  });
}

function drawHaze() {
  for(let i=0;i<3;i++){
    const y=H*(.375+i*.026)+Math.sin(tick*.28+i*1.7)*3.5*DPR;
    const g=X.createLinearGradient(0,y-10*DPR,0,y+10*DPR);
    g.addColorStop(0,'rgba(225,218,198,0)');
    g.addColorStop(.5,`rgba(225,218,198,${.025+Math.sin(tick*.24+i)*.008})`);
    g.addColorStop(1,'rgba(225,218,198,0)');
    X.fillStyle=g; X.fillRect(0,y-10*DPR,W,20*DPR);
  }
}

// ─── HUD ─────────────────────────────────────────────────────
let lastL='';
function updateHUD(){
  const c=pct(); let l,s;
  if(c<PH.day)    { l='day';         s='By day, it drifts like<br>a dried mango slice.'; }
  else if(c<PH.sunset){ l='sunset';  s='The light grows warmer.<br>Something is stirring.'; }
  else if(c<PH.dusk)  { l='dusk';    s='The heat fades.<br>The river holds its breath.'; }
  else if(c<PH.night) { l='night';   s='It gathers itself back<br>into a tiny living shape.'; }
  else                { l='before dawn'; s='Before sunrise,<br>it lies back down again.'; }
  if(l!==lastL){ document.getElementById('timeLabel').textContent=l; document.getElementById('caption').innerHTML=s; lastL=l; }
}

// ─── SOUND ───────────────────────────────────────────────────
document.getElementById('snd').addEventListener('click',()=>{
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    gainNode=audioCtx.createGain(); gainNode.gain.value=0; gainNode.connect(audioCtx.destination);
    [[174.6,.022],[261.6,.018],[392,.01]].forEach(([f,g])=>{
      const o=audioCtx.createOscillator(),gn=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f; gn.gain.value=g; o.connect(gn); gn.connect(gainNode); o.start();
    });
  }
  soundOn=!soundOn;
  gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
  gainNode.gain.setTargetAtTime(soundOn?1:0,audioCtx.currentTime,2.5);
  document.getElementById('snd').textContent=soundOn?'◉ sound':'○ sound';
});

// ─── MAIN LOOP ────────────────────────────────────────────────
function loop() {
  X.clearRect(0,0,W,H);
  const p=pal(), np=nightAmt(), ap=aliveAmt();

  const mainX = W*0.42 + Math.sin(tick*0.006)*5*DPR;
  const mainY = H*0.415;
  const catX  = mainX + W*0.18 + Math.sin(tick*0.005+1.4)*4*DPR;
  const catY  = mainY + H*0.005;

  drawSky(p);
  drawStarsMoon(np);
  drawWater(p);
  drawCreekCurrents();
  drawWaterLine(p);
  drawFlowWaves(p);
  drawSurfaceShimmer(p);
  drawLights(p);
  drawRipples(p);
  drawMangoRipples();
  drawHaze();

  drawFloaters();
  drawMangoCreature(mainX, mainY, ap, np);
  drawMangoKitten(catX, catY, ap, np);

  const vg=X.createRadialGradient(W*.5,H*.42,H*.1,W*.5,H*.42,W*.9);
  vg.addColorStop(0,'rgba(255,248,198,0)'); vg.addColorStop(.55,'rgba(255,238,168,0.020)'); vg.addColorStop(1,'rgba(22,16,6,0.22)');
  X.fillStyle=vg; X.fillRect(0,0,W,H);

  updateHUD();
  tick++;
  requestAnimationFrame(loop);
}
loop();
</script>
