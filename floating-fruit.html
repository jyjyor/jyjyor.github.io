<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浮果 — Floating Fruit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1e2e48; cursor: none; }
canvas { display: block; width: 100vw; height: 100vh; }

#cursor {
  position: fixed; width: 7px; height: 7px;
  background: rgba(255,220,168,0.65); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: background 0.4s;
}
#cursor.on-water { background: rgba(185,228,235,0.55); }

#title-wrap {
  position: fixed; left: 50%; top: 46%;
  transform: translate(-50%, -50%);
  text-align: center; pointer-events: none;
  z-index: 100; opacity: 0;
  transition: opacity 3s ease;
}
#title-wrap.show { opacity: 1; }

.t-main {
  font-family: 'Cormorant Garamond', 'Georgia', serif;
  font-style: italic; font-weight: 300;
  font-size: clamp(2.8rem, 7.5vw, 5.8rem);
  color: rgba(255,245,218,0.80);
  letter-spacing: 0.06em; line-height: 1.05;
  text-shadow: 0 0 60px rgba(255,205,130,0.22), 0 2px 12px rgba(0,0,0,0.18);
}
.t-cn {
  font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
  font-weight: 300; font-size: clamp(1.7rem, 4.5vw, 3.5rem);
  color: rgba(255,235,190,0.58);
  letter-spacing: 0.55em; text-indent: 0.55em;
  margin-top: 0.18em;
}
.t-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: clamp(0.68rem, 1.4vw, 0.92rem);
  color: rgba(248,228,188,0.32);
  letter-spacing: 0.24em; margin-top: 1.4em;
}

#back {
  position: fixed; top: 1.8rem; left: 2.2rem; z-index: 200;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.45rem; font-weight: 300; letter-spacing: 0.18em;
  color: rgba(210,195,158,0.48); text-decoration: none; cursor: none;
  transition: color 0.5s;
}
#back:hover { color: rgba(210,195,158,0.85); }

#snd {
  position: fixed; bottom: 2.4rem; right: 2.4rem; z-index: 200;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 0.86rem; letter-spacing: 0.24em;
  color: rgba(215,200,162,0.30); cursor: none; user-select: none;
  transition: color 0.4s;
}
#snd:hover { color: rgba(215,200,162,0.68); }

#phase {
  position: fixed; bottom: 2.4rem; left: 2.4rem; z-index: 200;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 0.82rem; letter-spacing: 0.28em;
  color: rgba(200,188,152,0.26); pointer-events: none;
  transition: opacity 1.5s;
}
</style>
</head>
<body>
<div id="cursor"></div>
<a id="back" href="index.html">← Jiayi</a>
<div id="title-wrap">
  <div class="t-main">Floating Fruit</div>
  <div class="t-cn">浮果</div>
  <div class="t-sub">a summer body preserved by water and sun</div>
</div>
<span id="snd">○ sound</span>
<span id="phase">morning</span>
<canvas id="c"></canvas>

<script>
// ══════════════════════════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════════════════════════
const C  = document.getElementById('c');
const X  = C.getContext('2d');
let W, H, DPR = 1;
let tick = 0;
let mouse = { x: 0, y: 0 };
let mangoHovered = false;
let clickTick = -999, clickX = 0, clickY = 0;
let mangoClickTick = -999;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = C.width  = innerWidth  * DPR;
  H = C.height = innerHeight * DPR;
}
window.addEventListener('resize', resize); resize();

// ══════════════════════════════════════════════════════════════
// MATH HELPERS
// ══════════════════════════════════════════════════════════════
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const ss    = (a, b, x)  => { const t = clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); };
const lc    = (a, b, t)  => a.map((v, i) => lerp(v, b[i], t));
const rgb   = c  => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
const rgba  = (c, a) => `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;

// ══════════════════════════════════════════════════════════════
// TIME / PHASE — 60 second cycle
// ══════════════════════════════════════════════════════════════
const CYCLE = 60 * 60; // 60 s at 60 fps
const PH = { morning: 0, afternoon: 0.25, sunset: 0.50, night: 0.83 };

const pct  = () => (tick % CYCLE) / CYCLE;

function phase() {
  const c = pct();
  if (c < PH.afternoon) return 'morning';
  if (c < PH.sunset)    return 'afternoon';
  if (c < PH.night)     return 'dusk';
  return 'night';
}

// Smooth 0→1 amounts for each phase
const morningAmt   = () => { const c=pct(); return c<PH.afternoon ? ss(0,PH.afternoon,c) : c<PH.sunset ? 1-ss(PH.afternoon,PH.sunset,c) : 0; };
const afternoonAmt = () => { const c=pct(); return c<PH.afternoon ? 0 : c<PH.sunset ? ss(PH.afternoon,PH.sunset,c) : c<PH.night ? 1-ss(PH.sunset,PH.night,c) : 0; };
const sunsetAmt    = () => { const c=pct(); return c<PH.sunset ? 0 : c<PH.night ? ss(PH.sunset,PH.night,c) : 1-ss(PH.night,1.0,c); };
const nightAmt     = () => { const c=pct(); return c<PH.night ? 0 : ss(PH.night, PH.night+0.05, c); };

// Mango "alive" — awakens during sunset, rests again at night
const aliveAmt = () => {
  const c = pct();
  const s = PH.sunset+0.04, pk = PH.sunset+0.18, e = PH.night-0.03, f = PH.night+0.04;
  if (c < s)  return 0;
  if (c < pk) return ss(s, pk, c);
  if (c < e)  return 1;
  if (c < f)  return 1 - ss(e, f, c);
  return 0;
};

// ══════════════════════════════════════════════════════════════
// PALETTES
// ══════════════════════════════════════════════════════════════
const PAL = {
  morning:   { skyT:[198,222,242], skyB:[225,238,215], wT:[148,215,210], wB:[85,158,155], lC:[255,242,185] },
  afternoon: { skyT:[220,215,182], skyB:[240,230,188], wT:[130,205,198], wB:[78,152,148], lC:[255,232,155] },
  sunset:    { skyT:[238,155,138], skyB:[250,202,162], wT:[175,152,182], wB:[85,118,148], lC:[248,208,168] },
  night:     { skyT:[16,26,62],    skyB:[36,50,88],    wT:[32,62,95],    wB:[16,36,72],   lC:[168,205,255] },
};

function blendP(a, b, t) {
  return { skyT:lc(a.skyT,b.skyT,t), skyB:lc(a.skyB,b.skyB,t), wT:lc(a.wT,b.wT,t), wB:lc(a.wB,b.wB,t), lC:lc(a.lC,b.lC,t) };
}
function getPal() {
  const c = pct();
  if (c < PH.afternoon) return blendP(PAL.morning,   PAL.afternoon, ss(0,            PH.afternoon, c));
  if (c < PH.sunset)    return blendP(PAL.afternoon,  PAL.sunset,   ss(PH.afternoon, PH.sunset,    c));
  if (c < PH.night)     return blendP(PAL.sunset,     PAL.night,    ss(PH.sunset,    PH.night,     c));
                        return blendP(PAL.night,       PAL.morning,  ss(PH.night,     1.0,          c));
}

// ══════════════════════════════════════════════════════════════
// RIPPLE SYSTEM
// ══════════════════════════════════════════════════════════════
const ripples = [];
function addRipple(x, y, str = 1, fromMouse = false) {
  ripples.push({ x, y, r: fromMouse ? 2 : 4, maxR: (55+Math.random()*55)*str, al: (fromMouse?0.16:0.28)*str, speed: fromMouse?0.48:0.78 });
}
function tickRipples() {
  for (let i = ripples.length-1; i >= 0; i--) {
    const rp = ripples[i];
    rp.r += rp.speed; rp.al *= 0.979;
    if (rp.al < 0.003 || rp.r > rp.maxR) ripples.splice(i, 1);
  }
}

// ══════════════════════════════════════════════════════════════
// STATIC DATA
// ══════════════════════════════════════════════════════════════
// Slow flow wave bands across water surface
const flowWaves = Array.from({length:8}, (_, i) => ({
  yFrac: 0.40 + i*0.072,
  amp:   (4.2 - i*0.38) * (1 + Math.random()*0.28),
  freq:  0.0020 + i*0.00055,
  spd:   0.042 - i*0.0038,
  ph:    Math.random() * Math.PI*2,
  al:    0.042 - i*0.003,
}));

// Fine ripple texture in deeper water
const deepRips = Array.from({length:10}, (_, i) => ({
  yf: 0.62 + (i/10)*0.36,
  amp: 0.72 + i*0.10, freq: 0.0036+i*0.00048, spd: 0.020+i*0.005, al: 0.008+i*0.001,
}));

// Creek current streaks
const creeks = Array.from({length:14}, (_, i) => ({
  yFrac: 0.42 + (i/14)*0.54, xBase: Math.random(),
  len:   0.05 + Math.random()*0.15,
  spd:   (0.000028+Math.random()*0.000050) * (Math.random()<0.78?1:-0.22),
  al:    0.012 + Math.random()*0.020,
  wY:    0.0012 + Math.random()*0.0022,
  wS:    0.007 + Math.random()*0.012,
  ph:    Math.random()*Math.PI*2,
  thk:   0.38 + Math.random()*0.60,
}));

// Surface glints
const glints = Array.from({length:22}, () => ({
  x:    Math.random(),
  yFrac:0.410 + Math.random()*0.048,
  spd:  (Math.random()*0.000045+0.000014)*(Math.random()<0.62?1:-1),
  ph:   Math.random()*Math.PI*2,
  tw:   Math.random()*0.038+0.014,
  w:    7 + Math.random()*15,
  h:    1.1 + Math.random()*2.0,
  al:   0.038 + Math.random()*0.068,
}));

// Stars
const stars = Array.from({length:58}, () => ({
  x: Math.random(), y: Math.random()*0.38,
  r: Math.random()*1.35+0.38, ph: Math.random()*Math.PI*2, tw: Math.random()*0.016+0.007,
}));

// Small floating mango pieces (last one is cat seed)
const floaters = Array.from({length:6}, (_, i) => ({
  xS: 0.06 + i*0.165 + Math.random()*0.07,
  yF: 0.422 + Math.random()*0.072,
  sc: 0.14 + Math.random()*0.16,
  spd: 0.000036 + Math.random()*0.000022,
  bob: Math.random()*Math.PI*2,
  ang: (Math.random()-0.5)*0.52,
  al:  0.44 + Math.random()*0.28,
  cat: i === 5,
}));
floaters[5].sc = 0.20; floaters[5].yF = 0.432; floaters[5].al = 0.30;

// Heat shimmer bands near waterline
const hazeB = Array.from({length:5}, (_, i) => ({
  y: 0.362 + i*0.016, ph: Math.random()*Math.PI*2,
}));

// Paper/grain noise texture (pregenerated)
const noiseC = document.createElement('canvas');
noiseC.width = noiseC.height = 256;
const nCtx = noiseC.getContext('2d');
const nImg = nCtx.createImageData(256, 256);
for (let i = 0; i < nImg.data.length; i += 4) {
  const v = Math.random()*255|0;
  nImg.data[i] = nImg.data[i+1] = nImg.data[i+2] = v;
  nImg.data[i+3] = Math.random()*14|0;
}
nCtx.putImageData(nImg, 0, 0);

// ══════════════════════════════════════════════════════════════
// MANGO SHAPE (dried slice silhouette — elongated, asymmetric)
// ══════════════════════════════════════════════════════════════
function mangoPath(ctx, bw, bh, j) {
  j = j || 0;
  ctx.moveTo(-bw*0.88, bh*0.07);
  ctx.bezierCurveTo(-bw*0.60, -bh*0.90+j,   bw*0.34, -bh*0.86+j*0.4,  bw*0.82, -bh*0.17);
  ctx.bezierCurveTo( bw*1.03,  bh*0.03,      bw*0.97,  bh*0.71,         bw*0.67,  bh*0.87);
  ctx.bezierCurveTo( bw*0.33,  bh*0.97,     -bw*0.42,  bh*0.91,        -bw*0.83,  bh*0.50);
  ctx.bezierCurveTo(-bw*1.04,  bh*0.32,     -bw*1.04, -bh*0.09,        -bw*0.88,  bh*0.07);
}

// ══════════════════════════════════════════════════════════════
// DRAW: GRAIN TEXTURE OVERLAY
// ══════════════════════════════════════════════════════════════
function drawGrain() {
  X.save(); X.globalAlpha = 0.032;
  const pat = X.createPattern(noiseC, 'repeat');
  if (pat) { X.fillStyle = pat; X.fillRect(0, 0, W, H); }
  X.restore();
}

// ══════════════════════════════════════════════════════════════
// DRAW: SKY
// ══════════════════════════════════════════════════════════════
function drawSky(p) {
  const wY = H * 0.40;
  const g = X.createLinearGradient(0, 0, 0, wY);
  g.addColorStop(0,   rgb(p.skyT));
  g.addColorStop(0.48, rgb(lc(p.skyT, p.skyB, 0.58)));
  g.addColorStop(1,   rgb(p.skyB));
  X.fillStyle = g; X.fillRect(0, 0, W, wY + 2);

  const na = nightAmt(), sa = sunsetAmt(), aa = afternoonAmt(), ma = morningAmt();

  // Daytime sun glow — upper right, very soft
  if (na < 0.85) {
    const sA = (1 - na) * 0.13;
    const sg = X.createRadialGradient(W*0.80, H*0.05, 0, W*0.80, H*0.05, W*0.52);
    sg.addColorStop(0, `rgba(255,246,195,${sA})`); sg.addColorStop(1, 'rgba(240,215,140,0)');
    X.fillStyle = sg; X.fillRect(0, 0, W, wY);
  }

  // Afternoon heat bloom — diffuse warm halo high in sky
  if (aa > 0.05) {
    const ab = X.createRadialGradient(W*0.62, H*0.08, 0, W*0.62, H*0.08, W*0.65);
    ab.addColorStop(0, `rgba(255,235,170,${aa*0.08})`); ab.addColorStop(1, 'rgba(242,218,135,0)');
    X.fillStyle = ab; X.fillRect(0, 0, W, wY);
  }

  // Sunset sky bloom
  if (sa > 0.02) {
    const sx = W*0.64, sy = wY*0.70;
    const sg = X.createRadialGradient(sx, sy, 0, sx, sy, W*0.50);
    sg.addColorStop(0,    `rgba(255,210,152,${sa*0.44})`);
    sg.addColorStop(0.20, `rgba(255,178,140,${sa*0.28})`);
    sg.addColorStop(0.48, `rgba(240,148,155,${sa*0.14})`);
    sg.addColorStop(1,    'rgba(218,128,148,0)');
    X.fillStyle = sg; X.fillRect(0, 0, W, wY);
    // Warm horizon band
    const hg = X.createLinearGradient(0, wY*0.52, 0, wY);
    hg.addColorStop(0, 'rgba(255,208,168,0)');
    hg.addColorStop(0.5, `rgba(255,192,155,${sa*0.22})`);
    hg.addColorStop(1,   `rgba(255,210,172,${sa*0.40})`);
    X.fillStyle = hg; X.fillRect(0, wY*0.52, W, wY*0.48);
    // Lavender wash at top during deep sunset
    if (sa > 0.5) {
      const lv = X.createLinearGradient(0, 0, 0, wY*0.4);
      lv.addColorStop(0,   `rgba(185,155,210,${sa*0.08})`);
      lv.addColorStop(1,   'rgba(185,155,210,0)');
      X.fillStyle = lv; X.fillRect(0, 0, W, wY*0.4);
    }
  }

  // Stars + moon (night)
  if (na > 0.02) {
    stars.forEach(s => {
      const tw = Math.sin(tick*s.tw+s.ph)*0.35+0.65;
      X.beginPath(); X.arc(s.x*W, s.y*H, s.r*DPR, 0, Math.PI*2);
      X.fillStyle = `rgba(215,228,255,${na*tw*0.70})`; X.fill();
    });
    const mx = W*0.74, my = H*0.12, mr = 15*DPR;
    const mg = X.createRadialGradient(mx, my, mr*0.3, mx, my, mr*3.6);
    mg.addColorStop(0, `rgba(212,228,255,${na*0.18})`); mg.addColorStop(1, 'rgba(188,210,255,0)');
    X.fillStyle = mg; X.beginPath(); X.arc(mx, my, mr*3.6, 0, Math.PI*2); X.fill();
    const mb = X.createRadialGradient(mx-mr*0.22, my-mr*0.22, 0, mx, my, mr);
    mb.addColorStop(0, `rgba(242,248,255,${na})`);
    mb.addColorStop(0.7, `rgba(228,238,255,${na*0.97})`);
    mb.addColorStop(1,   `rgba(200,218,255,${na*0.88})`);
    X.fillStyle = mb; X.beginPath(); X.arc(mx, my, mr, 0, Math.PI*2); X.fill();
  }
}

// ══════════════════════════════════════════════════════════════
// DRAW: WATER BASE
// ══════════════════════════════════════════════════════════════
function drawWater(p) {
  const wY = H*0.40;
  const na = nightAmt(), sa = sunsetAmt();

  // Base gradient — top/surface to deep bottom
  const g = X.createLinearGradient(0, wY, 0, H);
  g.addColorStop(0,    rgb(p.wT));
  g.addColorStop(0.10, rgb(lc(p.wT, p.wB, 0.16)));
  g.addColorStop(0.35, rgb(lc(p.wT, p.wB, 0.46)));
  g.addColorStop(0.70, rgb(lc(p.wT, p.wB, 0.80)));
  g.addColorStop(1,    rgb(p.wB));
  X.fillStyle = g; X.fillRect(0, wY, W, H-wY);

  // Sunset warm reflection
  if (sa > 0.02) {
    const r1 = X.createLinearGradient(0, wY, 0, wY+H*0.22);
    r1.addColorStop(0,   `rgba(250,185,162,${sa*0.14})`);
    r1.addColorStop(0.5, `rgba(244,172,152,${sa*0.07})`);
    r1.addColorStop(1,   'rgba(238,158,142,0)');
    X.fillStyle = r1; X.fillRect(0, wY, W, H*0.22);
    // Sun-path shimmer column on right
    const px = W*0.64;
    const sp = X.createRadialGradient(px, wY, 0, px, wY+H*0.26, W*0.26);
    sp.addColorStop(0,   `rgba(255,212,158,${sa*0.10})`);
    sp.addColorStop(0.5, `rgba(250,195,145,${sa*0.055})`);
    sp.addColorStop(1,   'rgba(245,178,132,0)');
    X.fillStyle = sp; X.fillRect(0, wY, W, H*0.48);
    // Purple shadow tint in bottom water
    if (sa > 0.4) {
      const pr = X.createLinearGradient(0, wY+H*0.35, 0, H);
      pr.addColorStop(0,   'rgba(88,68,115,0)');
      pr.addColorStop(0.5, `rgba(88,68,115,${sa*0.06})`);
      pr.addColorStop(1,   `rgba(72,52,105,${sa*0.10})`);
      X.fillStyle = pr; X.fillRect(0, wY+H*0.35, W, H*0.65);
    }
  }

  // Night: moonlight on water surface
  if (na > 0.02) {
    const nl = X.createLinearGradient(0, wY, 0, wY+H*0.16);
    nl.addColorStop(0, `rgba(75,108,178,${na*0.12})`); nl.addColorStop(1, 'rgba(42,72,128,0)');
    X.fillStyle = nl; X.fillRect(0, wY, W, H*0.16);
    // Moon reflection column
    const mx = W*0.74;
    const mr = X.createRadialGradient(mx, wY+H*0.16, 0, mx, wY+H*0.16, W*0.11);
    mr.addColorStop(0, `rgba(198,218,255,${na*0.09})`); mr.addColorStop(1, 'rgba(158,188,238,0)');
    X.fillStyle = mr; X.fillRect(0, wY, W, H*0.44);
  }

  // Slow undulating depth bands — break up flat look
  for (let i = 0; i < 4; i++) {
    const bY = wY + H*(0.11+i*0.20) + Math.sin(tick*0.004+i*1.5)*H*0.009;
    const bA = 0.016 + Math.sin(tick*0.008+i*0.85)*0.005;
    const bG = X.createLinearGradient(0, bY-H*0.028, 0, bY+H*0.028);
    bG.addColorStop(0, 'rgba(0,0,0,0)');
    bG.addColorStop(0.5, na>0.5 ? `rgba(8,20,52,${bA})` : sa>0.5 ? `rgba(52,32,65,${bA})` : `rgba(45,95,85,${bA})`);
    bG.addColorStop(1, 'rgba(0,0,0,0)');
    X.fillStyle = bG; X.fillRect(0, bY-H*0.028, W, H*0.056);
  }

  // Daytime warm surface tint (very subtle)
  if (na < 0.6 && sa < 0.4) {
    const wt = X.createLinearGradient(0, wY, 0, wY+H*0.18);
    wt.addColorStop(0, `rgba(255,230,148,0.028)`); wt.addColorStop(1, 'rgba(255,212,105,0)');
    X.fillStyle = wt; X.fillRect(0, wY, W, H*0.18);
  }
}

// ══════════════════════════════════════════════════════════════
// DRAW: WATER SURFACE (waves + effects)
// ══════════════════════════════════════════════════════════════
function drawWaterSurface(p) {
  const wY = H*0.40;
  const na = nightAmt(), sa = sunsetAmt();
  const isN = na > 0.5, isS = sa > 0.35;

  // Waterline highlight
  const lCol = isN ? [175,212,255] : isS ? [255,225,195] : [238,252,248];
  const sh = Math.sin(tick*0.014)*0.10+0.90;
  const wlG = X.createLinearGradient(0, wY-2*DPR, 0, wY+5*DPR);
  wlG.addColorStop(0,   rgba(lCol, 0.20*sh));
  wlG.addColorStop(0.4, rgba(lCol, 0.38*sh));
  wlG.addColorStop(1,   rgba(p.wT, 0.06));
  X.fillStyle = wlG; X.fillRect(0, wY-2*DPR, W, 7*DPR);

  // Flow wave bands
  flowWaves.forEach(fw => {
    const baseY = fw.yFrac * H;
    X.beginPath(); X.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 3) {
      const y = baseY
        + Math.sin(x*fw.freq/DPR + tick*fw.spd + fw.ph) * fw.amp*DPR
        + Math.sin(x*fw.freq/DPR*1.82 - tick*fw.spd*0.54 + fw.ph+1.75) * fw.amp*DPR*0.34;
      X.lineTo(x, y);
    }
    const al = isN ? fw.al*0.48 : fw.al;
    X.strokeStyle = isN ? `rgba(125,178,242,${al})` : isS ? `rgba(255,222,205,${al})` : `rgba(212,248,250,${al})`;
    X.lineWidth = 0.78*DPR; X.stroke();
  });

  // Creek current streaks
  creeks.forEach(s => {
    const xP = ((s.xBase + tick*s.spd)%1.14-0.07)*W;
    const yP = s.yFrac*H + Math.sin(tick*s.wS+s.ph)*s.wY*H;
    const len = s.len*W;
    if (xP+len < -W*0.05 || xP > W*1.05) return;
    const sg = X.createLinearGradient(xP, yP, xP+len, yP);
    const mC = isN ? `rgba(52,80,148,${s.al})` : isS ? `rgba(212,175,170,${s.al})` : `rgba(145,215,208,${s.al})`;
    const eC = isN ? 'rgba(20,38,80,0)' : isS ? 'rgba(175,145,140,0)' : 'rgba(108,182,175,0)';
    sg.addColorStop(0, eC); sg.addColorStop(0.14, mC); sg.addColorStop(0.86, mC); sg.addColorStop(1, eC);
    const mY = yP + Math.sin(tick*s.wS*1.4+s.ph+1.1)*s.wY*H*0.5;
    const eY = yP + Math.sin(tick*s.wS*0.9+s.ph+2.2)*s.wY*H*0.28;
    X.beginPath(); X.moveTo(xP, yP);
    X.bezierCurveTo(xP+len*0.32, mY, xP+len*0.68, yP, xP+len, eY);
    X.strokeStyle = sg; X.lineWidth = s.thk*DPR; X.lineCap = 'round'; X.stroke();
  });

  // Surface glints
  glints.forEach(s => {
    const x = ((s.x+tick*s.spd)%1.08-0.04)*W;
    const y = s.yFrac*H + Math.sin(tick*s.tw*0.5+s.ph)*1.4*DPR;
    const tw = Math.sin(tick*s.tw+s.ph)*0.5+0.5;
    const al = s.al*tw; if (al < 0.004) return;
    const col = isN ? [168,208,255] : isS ? [255,228,202] : [215,250,248];
    const sg = X.createRadialGradient(x, y, 0, x, y, s.w*DPR);
    sg.addColorStop(0, rgba(col, al)); sg.addColorStop(1, rgba(col, 0));
    X.fillStyle = sg; X.beginPath(); X.ellipse(x, y, s.w*DPR, s.h*DPR, 0, 0, Math.PI*2); X.fill();
  });

  // Fine deep-water ripple texture
  deepRips.forEach(r => {
    const y = r.yf*H;
    X.beginPath(); X.moveTo(0, y);
    for (let x = 0; x <= W; x += 5) {
      const w1 = Math.sin(x*r.freq/DPR + tick*r.spd)*r.amp*DPR;
      const w2 = Math.sin(x*r.freq/DPR*1.6 - tick*r.spd*0.50+1.2)*r.amp*DPR*0.28;
      X.lineTo(x, y+w1+w2);
    }
    X.strokeStyle = isN ? `rgba(108,162,235,${r.al*0.48})` : `rgba(255,255,255,${r.al})`;
    X.lineWidth = 0.52*DPR; X.stroke();
  });
}

// ══════════════════════════════════════════════════════════════
// DRAW: MOUSE/CLICK RIPPLE RINGS
// ══════════════════════════════════════════════════════════════
function drawRipples(p) {
  const na = nightAmt(), sa = sunsetAmt();
  ripples.forEach(rp => {
    const col = na>0.5 ? [128,175,240] : sa>0.35 ? [255,208,185] : [198,242,240];
    X.beginPath();
    X.ellipse(rp.x, rp.y, rp.r, rp.r*0.27, 0, 0, Math.PI*2);
    X.strokeStyle = rgba(col, rp.al); X.lineWidth = 0.88*DPR; X.stroke();
    if (rp.al > 0.07) {
      X.beginPath();
      X.ellipse(rp.x, rp.y, rp.r*0.60, rp.r*0.60*0.27, 0, 0, Math.PI*2);
      X.strokeStyle = rgba(col, rp.al*0.38); X.lineWidth = 1.3*DPR; X.stroke();
    }
  });
}

// ══════════════════════════════════════════════════════════════
// DRAW: ONE SMALL MANGO SLICE (reusable)
// ══════════════════════════════════════════════════════════════
function drawSlice(cx, cy, bw, bh, ang, alpha) {
  X.save(); X.globalAlpha = alpha;
  X.save(); X.translate(cx, cy); X.rotate(ang);
  const breathe = Math.sin(tick*0.022+ang*2);
  const gc = (194+breathe*13)|0;
  const g = X.createRadialGradient(-bw*0.12,-bh*0.18,0, bw*0.10,bh*0.06,bw*1.05);
  g.addColorStop(0,    `rgba(252,${gc},50,0.97)`);
  g.addColorStop(0.30, 'rgba(238,153,22,0.96)');
  g.addColorStop(0.66, 'rgba(205,103,10,0.92)');
  g.addColorStop(1,    'rgba(160,62,7,0.54)');
  X.beginPath(); mangoPath(X, bw, bh, 0); X.fillStyle = g; X.fill();
  X.strokeStyle = 'rgba(118,42,5,0.22)'; X.lineWidth = 0.82*DPR; X.lineJoin = 'round'; X.lineCap = 'round';
  X.beginPath(); mangoPath(X, bw, bh, 0); X.stroke();
  X.strokeStyle = 'rgba(142,60,7,0.17)'; X.lineWidth = 0.52*DPR; X.lineCap = 'round';
  for (let i=-1; i<=2; i++) {
    const ly=(i/3.5-0.12)*bh*1.5;
    const wv=Math.sin(tick*0.018+ang+i*1.2)*bw*0.034;
    X.beginPath();
    X.moveTo(-bw*0.68+wv, ly-bh*0.08);
    X.bezierCurveTo(-bw*0.20, ly+wv*0.4, bw*0.17, ly-wv*0.3, bw*0.64-wv, ly+bh*0.09);
    X.stroke();
  }
  const hlx = Math.sin(tick*0.018+ang)*bw*0.12;
  const hi = X.createRadialGradient(-bw*0.18+hlx,-bh*0.24,0, bw*0.04+hlx,bh*0.02,bw*0.53);
  hi.addColorStop(0, 'rgba(255,246,202,0.26)'); hi.addColorStop(1, 'rgba(255,236,175,0)');
  X.fillStyle = hi; X.beginPath(); mangoPath(X, bw, bh, 0); X.fill();
  X.restore();
  // Water shadow
  const sh = X.createRadialGradient(cx, cy+bh*0.78, 0, cx, cy+bh*1.02, bw*1.12);
  sh.addColorStop(0, 'rgba(78,42,6,0.13)'); sh.addColorStop(1, 'rgba(78,42,6,0)');
  X.fillStyle = sh; X.beginPath(); X.ellipse(cx, cy+bh*0.82, bw*0.98, bh*0.26, 0, 0, Math.PI*2); X.fill();
  X.restore();
}

// ══════════════════════════════════════════════════════════════
// DRAW: FLOATERS (small drifting pieces)
// ══════════════════════════════════════════════════════════════
function drawFloaters(ap) {
  floaters.forEach(f => {
    if (f.cat && ap > 0.06) return; // cat seed transitions into mango-cat
    const x = ((f.xS - tick*f.spd)%1.18+1.18)%1.18*W;
    const y = f.yF*H + Math.sin(tick*0.019+f.bob)*1.9*DPR;
    const sw = W*0.022*f.sc, sh = H*0.011*f.sc;
    drawSlice(x, y, sw, sh, f.ang, f.al);
  });
}

// ══════════════════════════════════════════════════════════════
// DRAW: MAIN MANGO CHARACTER
// ══════════════════════════════════════════════════════════════
function drawMainMango(ap, np) {
  // Bob + click sink effect
  const clickAge = tick - mangoClickTick;
  const clickBob = (clickAge < 90) ? Math.sin(clickAge*0.11)*H*0.016*Math.exp(-clickAge*0.022) : 0;
  const bob   = Math.sin(tick*0.020)*2.8*DPR + clickBob;
  const sway  = Math.sin(tick*0.013)*1.8*DPR;
  const fx    = W*0.37;
  const fy    = H*0.413;
  const cx    = fx + sway + Math.sin(tick*0.010)*1.5*DPR;
  const cy    = fy + bob;
  const tilt  = Math.sin(tick*0.015)*0.022 * (1+ap*0.4);

  const R     = H*0.050;
  const sw    = lerp(R*1.76, R*1.06, ap);
  const sh    = lerp(R*0.42, R*1.22, ap);
  const riseY = lerp(0, -R*0.52, ap);
  const br    = 1 + Math.sin(tick*0.028)*0.020;
  const bw    = sw*br, bh = sh*br;
  const gc    = (194 + Math.sin(tick*0.024)*14)|0;

  // Hover check (screen coordinates vs canvas)
  const mX = mouse.x*DPR, mY = mouse.y*DPR;
  mangoHovered = Math.hypot(mX-cx, mY-(cy+riseY)) < sw*1.25;

  X.save(); X.translate(cx, cy+riseY); X.rotate(tilt);

  // ── Leaf sprout (sunset transformation)
  if (ap > 0.10) {
    const la = ss(0.10, 0.45, ap);
    X.save(); X.globalAlpha = la;
    X.translate(0, -bh*0.87); X.rotate(Math.sin(tick*0.045)*0.18);
    const lL = R*0.30*la;
    X.beginPath(); X.moveTo(0,0); X.lineTo(0,-lL*0.34);
    X.strokeStyle='rgba(86,132,55,0.76)'; X.lineWidth=1.4*DPR; X.stroke();
    X.beginPath();
    X.moveTo(0,-lL*0.18);
    X.bezierCurveTo(-lL*0.56,-lL*0.50,-lL*0.40,-lL*0.90,0,-lL);
    X.bezierCurveTo( lL*0.40,-lL*0.90, lL*0.56,-lL*0.50,0,-lL*0.18);
    const lg=X.createLinearGradient(0,-lL*0.18,0,-lL);
    lg.addColorStop(0,'rgba(102,155,65,0.90)'); lg.addColorStop(1,'rgba(135,192,78,0.84)');
    X.fillStyle=lg; X.fill(); X.restore();
  }

  // ── Main body
  {
    const j = Math.sin(tick*0.032+0.3)*bw*0.016;
    const bg=X.createRadialGradient(-bw*0.22,-bh*0.24,0,0,0,bw*1.16);
    bg.addColorStop(0,    `rgba(255,${gc},52,1)`);
    bg.addColorStop(0.24, 'rgba(242,160,28,1)');
    bg.addColorStop(0.58, 'rgba(218,108,12,0.97)');
    bg.addColorStop(0.84, 'rgba(182,68,7,0.88)');
    bg.addColorStop(1,    'rgba(148,48,5,0.58)');
    X.beginPath(); mangoPath(X,bw,bh,j); X.fillStyle=bg; X.fill();
    X.strokeStyle='rgba(114,40,5,0.24)'; X.lineWidth=0.95*DPR; X.lineJoin='round'; X.lineCap='round';
    X.beginPath(); mangoPath(X,bw,bh,j); X.stroke();
    const bs=X.createLinearGradient(0,-bh,0,bh);
    bs.addColorStop(0.52,'rgba(95,34,3,0)'); bs.addColorStop(1,'rgba(95,34,3,0.22)');
    X.fillStyle=bs; X.beginPath(); mangoPath(X,bw,bh,j); X.fill();
    const hlx=Math.sin(tick*0.018)*bw*0.11;
    const hl=X.createRadialGradient(-bw*0.27+hlx,-bh*0.29,0,bw*0.03+hlx,bh*0.03,bw*0.60);
    hl.addColorStop(0,'rgba(255,246,202,0.30)'); hl.addColorStop(1,'rgba(255,236,175,0)');
    X.fillStyle=hl; X.beginPath(); mangoPath(X,bw,bh,j); X.fill();
    // Wrinkles — horizontal fiber, more visible in afternoon
    const wkAl = lerp(0.10, 0.20, ss(PH.afternoon, PH.sunset, pct()));
    X.strokeStyle=`rgba(142,58,7,${wkAl})`; X.lineWidth=0.62*DPR; X.lineCap='round';
    for (let i=-2; i<=2; i++) {
      const ly=i*bh*0.20;
      const wv=Math.sin(tick*0.016+i*1.3)*bw*0.032;
      X.beginPath();
      X.moveTo(-bw*0.68+wv, ly-bh*0.03);
      X.bezierCurveTo(-bw*0.20, ly+wv*0.4, bw*0.15, ly-wv*0.3, bw*0.60-wv, ly+bh*0.05);
      X.stroke();
    }
  }

  // ── Eyes — soft arc style, appear at sunset
  if (ap > 0.16) {
    const ea = ss(0.16, 0.52, ap);
    const er = lerp(0, bw*0.062, ea);
    const eyY=-bh*0.10, eyX=bw*0.22;
    X.save(); X.globalAlpha=ea;
    // Blink more when hovered
    const blinkAmt = mangoHovered
      ? Math.sin(tick*0.30)*0.5+0.5
      : clamp(Math.sin(tick*0.016)*0.5+0.5, 0.35, 1.0);
    [-eyX, eyX].forEach(ex => {
      X.beginPath();
      X.arc(ex, eyY+er*0.10, er*Math.max(blinkAmt,0.06), Math.PI*1.10, Math.PI*1.90, false);
      X.strokeStyle='rgba(70,22,3,0.84)'; X.lineWidth=er*0.50; X.lineCap='round'; X.stroke();
      if (blinkAmt > 0.28) {
        X.beginPath(); X.arc(ex+er*0.26, eyY-er*0.08, er*0.20, 0, Math.PI*2);
        X.fillStyle='rgba(255,246,212,0.58)'; X.fill();
      }
    });
    X.restore();
  }

  // ── Arm stubs (late sunset)
  if (ap > 0.52) {
    const aa = ss(0.52, 0.80, ap);
    const wav = Math.sin(tick*0.062)*0.26;
    X.save(); X.globalAlpha=aa;
    [-1,1].forEach(s => {
      X.save(); X.translate(s*bw*0.88, bh*0.03); X.rotate(s*0.48+wav*s);
      const ag=X.createRadialGradient(0,0,0,0,0,bw*0.185);
      ag.addColorStop(0,'rgba(240,170,36,0.96)'); ag.addColorStop(1,'rgba(200,106,14,0.68)');
      X.beginPath(); X.ellipse(0,0,bw*0.096,bw*0.192,0,0,Math.PI*2); X.fillStyle=ag; X.fill();
      X.restore();
    });
    X.restore();
  }

  X.restore();

  // ── Water-over-mango effect (waves pass ON TOP — makes it feel submerged)
  X.save(); X.globalAlpha=0.10;
  flowWaves.slice(0,4).forEach(fw => {
    const y1 = fw.yFrac*H;
    if (y1 < cy+riseY-bh*0.4 || y1 > cy+bh*0.55) return;
    X.beginPath(); X.moveTo(cx-bw*1.9, y1);
    for (let x=cx-bw*1.9; x<=cx+bw*1.9; x+=2) {
      const y=y1+Math.sin(x*fw.freq/DPR+tick*fw.spd+fw.ph)*fw.amp*DPR;
      X.lineTo(x,y);
    }
    X.lineTo(cx+bw*1.9, cy+bh*1.6); X.lineTo(cx-bw*1.9, cy+bh*1.6); X.closePath();
    X.fillStyle=rgba([140,210,205],0.30); X.fill();
  });
  X.restore();

  // ── Reflection shadow below mango
  const rs=X.createRadialGradient(cx,fy+2*DPR,0,cx,fy+2*DPR,sw*1.65);
  rs.addColorStop(0,`rgba(85,52,9,${0.13+ap*0.05})`); rs.addColorStop(1,'rgba(85,52,9,0)');
  X.fillStyle=rs; X.beginPath(); X.ellipse(cx,fy+2*DPR,sw*1.65,sw*0.24,0,0,Math.PI*2); X.fill();

  // ── Night glow halo
  if (np > 0.08 && ap > 0.05) {
    const gl=X.createRadialGradient(cx,cy+riseY,0,cx,cy+riseY,sw*2.8);
    gl.addColorStop(0,`rgba(255,192,58,${0.17*np*ap})`); gl.addColorStop(1,'rgba(255,158,30,0)');
    X.fillStyle=gl; X.beginPath(); X.arc(cx,cy+riseY,sw*2.8,0,Math.PI*2); X.fill();
  }
}

// ══════════════════════════════════════════════════════════════
// DRAW: MANGO-CAT
// ══════════════════════════════════════════════════════════════
function drawMangoCat(ap, np) {
  if (ap < 0.04) return;
  const ea = ss(0.04, 0.30, ap);

  // Emerge from where the cat-seed floater was, drift to fixed position
  const seed = floaters[5];
  const seedX = ((seed.xS - tick*seed.spd)%1.18+1.18)%1.18*W;
  const tgtX  = W*0.57 + Math.sin(tick*0.013+2.1)*2.4*DPR;
  const tgtY  = H*0.415;
  const cx = lerp(seedX, tgtX, ss(0.04, 0.22, ap));
  const cy = tgtY + Math.sin(tick*0.026+1.5)*2.0*DPR;
  const sway = Math.sin(tick*0.017+2.3)*0.016*ap;
  const gc = (192+Math.sin(tick*0.026+1.3)*14)|0;

  const R  = H*0.030 * lerp(0.45, 1.0, ss(0.04,0.32,ap));
  const bw = lerp(R*1.62, R*1.08, ap);
  const bh = lerp(R*0.36, R*0.86, ap);

  X.save(); X.globalAlpha=ea;
  X.translate(cx,cy); X.rotate(sway);

  // Water shadow
  {
    const sg=X.createRadialGradient(0,bh*0.84,0,0,bh*1.0,bw*1.45);
    sg.addColorStop(0,`rgba(65,44,7,${0.15+ap*0.05})`); sg.addColorStop(1,'rgba(65,44,7,0)');
    X.fillStyle=sg; X.beginPath(); X.ellipse(0,bh*0.84,bw*1.38,bh*0.24,0,0,Math.PI*2); X.fill();
  }

  // Tail
  if (ap > 0.16) {
    const ta=ss(0.16,0.72,ap);
    const tw=lerp(Math.max(R*0.05,1.4*DPR),R*0.26,ap);
    const curl=Math.sin(tick*0.058+0.75)*lerp(0.07,0.48,ap);
    const tg=X.createLinearGradient(bw*0.5,0,bw*2.5,-R*1.0);
    tg.addColorStop(0,'rgba(212,142,24,0.94)'); tg.addColorStop(0.5,'rgba(232,168,34,0.86)'); tg.addColorStop(1,'rgba(244,188,48,0.60)');
    X.save(); X.globalAlpha=ta;
    X.beginPath();
    X.moveTo(bw*0.48,bh*0.28);
    X.bezierCurveTo(bw*(1.48+curl*0.28),bh*(0.78+curl*0.10),bw*(2.45+curl*0.42),bh*(0.06+curl*0.30),bw*(2.20+curl*0.36),R*(-0.64+curl*0.20));
    X.strokeStyle=tg; X.lineWidth=tw; X.lineCap='round'; X.stroke(); X.restore();
  }

  // Leaf ears
  if (ap > 0.09) {
    const eA=ss(0.09,0.42,ap);
    const eH=lerp(R*0.36,R*1.10,ap), eW=lerp(R*0.18,R*0.46,ap);
    const hY=lerp(-bh*0.48,-bh*0.74,ap);
    X.save(); X.globalAlpha=eA;
    [-1,1].forEach(s => {
      const ex=s*lerp(bw*0.38,R*0.55,ap), ey=hY;
      const eg=X.createRadialGradient(ex,ey-eH*0.28,0,ex,ey,eH*1.02);
      eg.addColorStop(0,'rgba(243,185,40,0.97)'); eg.addColorStop(0.5,'rgba(222,138,17,0.95)'); eg.addColorStop(1,'rgba(185,94,7,0.74)');
      X.beginPath();
      X.moveTo(ex-s*eW*0.52,ey);
      X.bezierCurveTo(ex-s*eW*0.26,ey-eH*0.38,ex+s*eW*0.05,ey-eH*0.90,ex+s*eW*0.09,ey-eH*0.86);
      X.bezierCurveTo(ex+s*eW*0.44,ey-eH*0.48,ex+s*eW*0.56,ey-eH*0.05,ex+s*eW*0.50,ey);
      X.closePath(); X.fillStyle=eg; X.fill();
      X.strokeStyle='rgba(112,40,4,0.17)'; X.lineWidth=0.62*DPR; X.lineJoin='round'; X.stroke();
    });
    X.restore();
  }

  // Body — mango shape
  {
    const j=Math.sin(tick*0.030+0.5)*bw*0.016;
    const bg=X.createRadialGradient(-bw*0.20,-bh*0.22,0,0,0,bw*1.22);
    bg.addColorStop(0,    `rgba(255,${gc},52,1)`);
    bg.addColorStop(0.22, 'rgba(240,158,28,1)');
    bg.addColorStop(0.54, 'rgba(218,108,10,1)');
    bg.addColorStop(0.80, 'rgba(183,68,6,0.96)');
    bg.addColorStop(1,    'rgba(148,48,4,0.64)');
    X.beginPath(); mangoPath(X,bw,bh,j); X.fillStyle=bg; X.fill();
    X.strokeStyle='rgba(114,40,4,0.22)'; X.lineWidth=0.88*DPR; X.lineJoin='round'; X.lineCap='round';
    X.beginPath(); mangoPath(X,bw,bh,j); X.stroke();
    const bs=X.createLinearGradient(0,-bh,0,bh);
    bs.addColorStop(0.52,'rgba(100,38,3,0)'); bs.addColorStop(1,'rgba(100,38,3,0.24)');
    X.fillStyle=bs; X.beginPath(); mangoPath(X,bw,bh,j); X.fill();
    const hlx=Math.sin(tick*0.018+2.3)*bw*0.13;
    const hl=X.createRadialGradient(-bw*0.24+hlx,-bh*0.28,0,hlx,-bh*0.04,bw*0.62);
    hl.addColorStop(0,'rgba(255,246,192,0.30)'); hl.addColorStop(1,'rgba(255,230,165,0)');
    X.fillStyle=hl; X.beginPath(); mangoPath(X,bw,bh,j); X.fill();
    X.strokeStyle=`rgba(142,58,6,${lerp(0.14,0.07,ap)})`; X.lineWidth=0.68*DPR; X.lineCap='round';
    for (let i=-1; i<=2; i++) {
      const ly=(i/3.5-0.10)*bh*1.3;
      const wv=Math.sin(tick*0.020+i*1.3+1.4)*bw*0.030;
      X.beginPath(); X.moveTo(-bw*0.62+wv,ly-bh*0.07);
      X.bezierCurveTo(-bw*0.18,ly+wv*0.4,bw*0.13,ly-wv*0.3,bw*0.56-wv,ly+bh*0.09); X.stroke();
    }
  }

  // Head
  if (ap > 0.10) {
    const hA=ss(0.10,0.50,ap);
    if (hA > 0.02) {
      const hr=lerp(R*0.42,R*0.88,ap);
      const hy=lerp(-bh*0.48,-bh*0.76,ap);
      X.save(); X.globalAlpha=hA;
      const hg=X.createRadialGradient(-hr*0.24,hy-hr*0.24,0,0,hy,hr*1.12);
      hg.addColorStop(0,`rgba(255,${(gc+5)|0},55,1)`); hg.addColorStop(0.24,'rgba(242,158,32,1)'); hg.addColorStop(0.58,'rgba(220,111,12,1)'); hg.addColorStop(1,'rgba(180,72,6,0.85)');
      X.beginPath();
      X.moveTo(0,hy-hr*0.90);
      X.bezierCurveTo( hr*0.60,hy-hr*0.83, hr*0.93,hy-hr*0.34, hr*0.93,hy+hr*0.09);
      X.bezierCurveTo( hr*0.93,hy+hr*0.60, hr*0.54,hy+hr*0.88,       0,hy+hr*0.88);
      X.bezierCurveTo(-hr*0.54,hy+hr*0.88,-hr*0.93,hy+hr*0.60,-hr*0.93,hy+hr*0.09);
      X.bezierCurveTo(-hr*0.93,hy-hr*0.34,-hr*0.60,hy-hr*0.83,       0,hy-hr*0.90);
      X.fillStyle=hg; X.fill();
      X.strokeStyle='rgba(112,40,4,0.18)'; X.lineWidth=0.82*DPR; X.lineJoin='round';
      X.beginPath();
      X.moveTo(0,hy-hr*0.90);
      X.bezierCurveTo( hr*0.60,hy-hr*0.83, hr*0.93,hy-hr*0.34, hr*0.93,hy+hr*0.09);
      X.bezierCurveTo( hr*0.93,hy+hr*0.60, hr*0.54,hy+hr*0.88,       0,hy+hr*0.88);
      X.bezierCurveTo(-hr*0.54,hy+hr*0.88,-hr*0.93,hy+hr*0.60,-hr*0.93,hy+hr*0.09);
      X.bezierCurveTo(-hr*0.93,hy-hr*0.34,-hr*0.60,hy-hr*0.83,       0,hy-hr*0.90);
      X.stroke(); X.restore();
    }
  }

  // Cat eyes — sleepy arc dots
  if (ap > 0.26) {
    const eyA=ss(0.26,0.62,ap);
    const hr=lerp(R*0.42,R*0.88,ap);
    const hy=lerp(-bh*0.48,-bh*0.76,ap);
    const er=hr*0.17, eyX=hr*0.24, eyY=hy+hr*0.04;
    X.save(); X.globalAlpha=eyA;
    [-eyX,eyX].forEach(ex => {
      X.beginPath(); X.arc(ex,eyY+er*0.10,er*0.90,Math.PI*1.10,Math.PI*1.90,false);
      X.strokeStyle='rgba(66,20,2,0.82)'; X.lineWidth=er*0.48; X.lineCap='round'; X.stroke();
      X.beginPath(); X.arc(ex+er*0.24,eyY-er*0.07,er*0.20,0,Math.PI*2);
      X.fillStyle='rgba(255,245,210,0.55)'; X.fill();
    });
    X.restore();
  }

  // Night glow
  if (np > 0.08 && ap > 0.08) {
    const gl=X.createRadialGradient(0,0,0,0,0,R*3.2);
    gl.addColorStop(0,`rgba(245,182,50,${0.13*np*ap})`); gl.addColorStop(1,'rgba(218,150,28,0)');
    X.fillStyle=gl; X.beginPath(); X.arc(0,0,R*3.2,0,Math.PI*2); X.fill();
  }

  X.restore();

  // Cat water shadow
  const catRS=X.createRadialGradient(cx,tgtY+1*DPR,0,cx,tgtY+1*DPR,bw*1.4);
  catRS.addColorStop(0,`rgba(80,48,8,${0.10+ap*0.04*ea})`); catRS.addColorStop(1,'rgba(80,48,8,0)');
  X.fillStyle=catRS; X.globalAlpha=ea;
  X.beginPath(); X.ellipse(cx,tgtY+1*DPR,bw*1.4,bw*0.22,0,0,Math.PI*2); X.fill();
  X.globalAlpha=1;
}

// ══════════════════════════════════════════════════════════════
// DRAW: HEAT HAZE
// ══════════════════════════════════════════════════════════════
function drawHeatHaze(aa) {
  if (aa < 0.04) return;
  const wY = H*0.40;
  hazeB.forEach(h => {
    const y = h.y*H + Math.sin(tick*0.22+h.ph)*2.5*DPR;
    const al = aa*(0.018+Math.sin(tick*0.18+h.ph)*0.007)*0.75;
    const g=X.createLinearGradient(0,y-7*DPR,0,y+7*DPR);
    g.addColorStop(0,'rgba(232,218,192,0)');
    g.addColorStop(0.5,`rgba(232,218,192,${al})`);
    g.addColorStop(1,'rgba(232,218,192,0)');
    X.fillStyle=g; X.fillRect(0,y-7*DPR,W,14*DPR);
  });
  // Horizon heat bloom
  const bloom=X.createLinearGradient(0,wY-H*0.07,0,wY+H*0.04);
  bloom.addColorStop(0,`rgba(255,238,198,${aa*0.055})`);
  bloom.addColorStop(0.5,`rgba(255,225,172,${aa*0.035})`);
  bloom.addColorStop(1,'rgba(255,215,152,0)');
  X.fillStyle=bloom; X.fillRect(0,wY-H*0.07,W,H*0.11);
}

// ══════════════════════════════════════════════════════════════
// DRAW: VIGNETTE
// ══════════════════════════════════════════════════════════════
function drawVignette() {
  const vg=X.createRadialGradient(W*0.50,H*0.50,H*0.12,W*0.50,H*0.50,W*0.88);
  vg.addColorStop(0,'rgba(255,242,192,0)');
  vg.addColorStop(0.48,'rgba(25,16,5,0.015)');
  vg.addColorStop(1,'rgba(6,4,1,0.26)');
  X.fillStyle=vg; X.fillRect(0,0,W,H);
}

// ══════════════════════════════════════════════════════════════
// HUD / UI
// ══════════════════════════════════════════════════════════════
const phaseEl   = document.getElementById('phase');
const titleEl   = document.getElementById('title-wrap');
const cursorEl  = document.getElementById('cursor');
let lastPhase   = '';
let titleShown  = false;

function updateHUD() {
  const ph = phase();
  if (ph !== lastPhase) { phaseEl.textContent = ph; lastPhase = ph; }
  if (tick > 9*60 && !titleShown) { titleEl.classList.add('show'); titleShown = true; }
  cursorEl.className = mouse.y > innerHeight*0.40 ? 'on-water' : '';
}

// ══════════════════════════════════════════════════════════════
// SOUND (placeholder — ready for real audio)
// ══════════════════════════════════════════════════════════════
let audioCtx, gainNode, soundOn = false;
document.getElementById('snd').addEventListener('click', () => {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    gainNode = audioCtx.createGain(); gainNode.gain.value = 0; gainNode.connect(audioCtx.destination);
    // Soft ambient tones — water / summer feeling
    [[196.0, 0.018],[293.7, 0.012],[130.8, 0.022],[392.0, 0.008],[261.6, 0.010]].forEach(([f,g]) => {
      const o=audioCtx.createOscillator(), gn=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f; gn.gain.value=g;
      o.connect(gn); gn.connect(gainNode); o.start();
    });
  }
  soundOn = !soundOn;
  gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
  gainNode.gain.setTargetAtTime(soundOn?1:0, audioCtx.currentTime, 3.0);
  document.getElementById('snd').textContent = soundOn ? '◉ sound' : '○ sound';
});

// ══════════════════════════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════════════════════════
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX+'px'; cursorEl.style.top = e.clientY+'px';
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (e.clientY > innerHeight*0.40 && tick%6===0) {
    addRipple(e.clientX*DPR, e.clientY*DPR, 0.50, true);
  }
});

document.addEventListener('click', e => {
  if (e.clientY > innerHeight*0.40) {
    addRipple(e.clientX*DPR, e.clientY*DPR, 1.5, false);
    if (mangoHovered) {
      mangoClickTick = tick;
      // Scatter ripples outward
      for (let i=0; i<4; i++) {
        setTimeout(() => addRipple(
          W*0.37 + (Math.random()-0.5)*90*DPR,
          H*0.413,
          0.7+Math.random()*0.5
        ), i*100);
      }
    }
  }
});

// ══════════════════════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════════════════════
function loop() {
  X.clearRect(0, 0, W, H);

  const p  = getPal();
  const ap = aliveAmt();
  const np = nightAmt();
  const aa = afternoonAmt();

  // Render layers: back → front
  drawSky(p);
  drawWater(p);
  drawWaterSurface(p);
  drawRipples(p);
  drawHeatHaze(aa);
  drawFloaters(ap);
  drawMainMango(ap, np);
  drawMangoCat(ap, np);
  drawVignette();
  drawGrain();

  tickRipples();
  updateHUD();
  tick++;
  requestAnimationFrame(loop);
}
loop();
</script>
